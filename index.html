                            const effectiveLen = isSpecial ? 4 : nameLen;
                            const fontSizeClass = effectiveLen >= 8 ? 'text-[12px]' : effectiveLen >= 5 ? 'text-[14px]' : 'text-[16px]';
                            return (
                              <button
                                key={name}
                                onClick={() => {
                                  const newName = name === selectedName ? "" : name;
                                  setSelectedName(newName);
                                  if (newName) {
                                    setRecentSearches(prev => {
                                      const filtered = prev.filter(n => n !== newName);
                                      const updated = [newName, ...filtered].slice(0, 10);
                                      localStorage.setItem('sungdong_recent_searches', JSON.stringify(updated));
                                      return updated;
                                    });
                                  }
                                }}
                                className={`px-0.5 py-0.5 rounded-lg ${fontSizeClass} font-bold transition-all active:scale-95 touch-manipulation border flex items-center justify-center text-center break-keep leading-tight min-h-[34px] ${selectedName === name ? 'bg-teal-600 text-white border-teal-700 shadow-md' : 'bg-gray-200 text-gray-800 border-gray-400 hover:bg-teal-50 hover:border-teal-400 shadow-sm'}`}
                              >
                                {name === "금호벽산경로당" ? <span>금호벽산<br />경로당</span> :
                                  name === "금호벽산제2경로당" ? <span>금호벽산<br />제2경로당</span> :
                                    name}
                              </button>
                            );
                          })}
                        </div>
                      </div>
                    </div>
                  )}
                </div>

                {selectedName && stats && (
                  <div className="px-4 md:px-6 pb-3">
                    <div className="grid grid-cols-4 gap-2 md:gap-3">
                      <div className="bg-teal-200 rounded-xl p-2.5 md:p-3 text-center border border-teal-300">
                        <div className="text-[13px] md:text-[15px] text-teal-800 font-bold">전체</div>
                        <div className="text-2xl md:text-3xl font-black text-teal-900">{stats.total}</div>
                      </div>
                      <div className="bg-blue-200 rounded-xl p-2.5 md:p-3 text-center border border-blue-300">
                        <div className="text-[13px] md:text-[15px] text-blue-800 font-bold">출석</div>
                        <div className="text-2xl md:text-3xl font-black text-blue-900">{stats.attended}</div>
                      </div>
                      <div className="bg-red-200 rounded-xl p-2.5 md:p-3 text-center border border-red-300">
                        <div className="text-[13px] md:text-[15px] text-red-800 font-bold">결석</div>
                        <div className="text-2xl md:text-3xl font-black text-red-900">{stats.absent}</div>
                      </div>
                      <div className="bg-gray-200 rounded-xl p-2.5 md:p-3 text-center border border-gray-300">
                        <div className="text-[13px] md:text-[15px] text-gray-800 font-bold">취소</div>
                        <div className="text-2xl md:text-3xl font-black text-gray-900">{stats.canceled}</div>
                      </div>
                    </div>
                  </div>
                )}

                {selectedName && (
                  <div className="px-4 md:px-6 pb-5">
                    {filteredRecords.length === 0 ? (
                      <div className="text-center py-8 text-gray-400 font-bold text-base">학습 참여 기록이 없습니다.</div>
                    ) : (
                      <div className="space-y-2.5 md:space-y-3">
                        {filteredRecords.map((rec, idx) => {
                          const isAttended = rec.attendanceTag.includes("출석");
                          const isAbsent = rec.attendanceTag.includes("결석");
                          const isCanceled = rec.attendanceTag.includes("취소");
                          const borderColor = isAbsent ? "border-l-red-400" : isCanceled ? "border-l-gray-400" : isAttended ? "border-l-blue-400" : "border-l-teal-300";
                          const bgColor = isAbsent ? "bg-red-50/50" : isCanceled ? "bg-gray-50/50" : "bg-white";

                          return (
                            <div key={idx} className={`${bgColor} rounded-xl border border-gray-200 border-l-4 ${borderColor} shadow-sm overflow-hidden transition-all hover:shadow-md`}>
                              <div className="px-3 md:px-4 py-2.5 md:py-3">
                                <div className="flex items-center gap-2 flex-wrap">
                                  <span className="font-extrabold text-[16px] md:text-[18px] text-gray-900 whitespace-nowrap">{rec.dateStr}</span>
                                  <span className="text-[14px] md:text-[16px] text-teal-600 font-bold bg-teal-50 px-2 py-0.5 rounded-full border border-teal-200 whitespace-nowrap">{rec.team}</span>
                                  <span className="text-[15px] md:text-[17px] text-gray-700 font-semibold whitespace-nowrap">{rec.teacher}</span>
                                  <span className="text-[14px] md:text-[16px] text-gray-500 font-medium whitespace-nowrap">📍 {rec.location}</span>
                                </div>
                                <div className="flex items-center gap-2 mt-1.5 flex-wrap">
                                  {rec.attendanceTag && (
                                    <span className={`text-[14px] md:text-[16px] font-bold px-2.5 py-0.5 rounded-full ${isAbsent ? 'bg-red-100 text-red-700 border border-red-300' : isCanceled ? 'bg-gray-200 text-gray-600 border border-gray-300' : 'bg-blue-100 text-blue-700 border border-blue-300'}`}>
                                      {rec.attendanceTag}
                                    </span>
                                  )}
                                  {rec.memo && (
                                    <span className="text-[14px] md:text-[16px] text-gray-700 font-medium">💬 {rec.memo}</span>
                                  )}
                                </div>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // =====================================================================
    // 📅 4. 나의 주간 일정 보기 컴포넌트
    // =====================================================================
    function MyWeeklyScheduleApp({ team, teacher, onNavigateBack }) {
      const [currentWeekStart, setCurrentWeekStart] = useState(() => {
        const d = new Date();
        const day = d.getDay();
        if (day === 0) d.setDate(d.getDate() + 1);
        else if (day === 6) d.setDate(d.getDate() + 2);
        const newDay = d.getDay();
        const diff = d.getDate() - newDay + (newDay === 0 ? -6 : 1);
        return new Date(d.setDate(diff));
      });

      const [scheduleData, setScheduleData] = useState(null);
      const [specialDays, setSpecialDays] = useState({});
      const [isLoading, setIsLoading] = useState(false);
      const [sheetRange, setSheetRange] = useState({ min: null, max: null });
      const [notice, setNotice] = useState("");
      const [cachedCsv, setCachedCsv] = useState("");

      const weekDays = ['월', '화', '수', '목', '금'];
      const [timeSlots, setTimeSlots] = useState([]);

      const getCurrentWeekDays = useCallback(() => {
        const days = [];
        for (let i = 0; i < 5; i++) {
          const d = new Date(currentWeekStart);
          d.setDate(currentWeekStart.getDate() + i);
          days.push(d);
        }
        return days;
      }, [currentWeekStart]);

      const currentDays = getCurrentWeekDays();
      const startMonth = currentDays[0].getMonth() + 1;
      const startDay = currentDays[0].getDate();
      const endMonth = currentDays[4].getMonth() + 1;
      const endDay = currentDays[4].getDate();

      const changeWeek = (offsetWeeks) => {
        const newDate = new Date(currentWeekStart);
        newDate.setDate(newDate.getDate() + (offsetWeeks * 7));

        if (sheetRange.min && sheetRange.max) {
          const weekEnd = new Date(newDate);
          weekEnd.setDate(weekEnd.getDate() + 4);
          if (weekEnd < sheetRange.min || newDate > sheetRange.max) {
            setNotice("⚠️ 더 이상 이동할 수 없습니다. (시트 데이터 범위 초과)");
            setTimeout(() => setNotice(""), 3000);
            return;
          }
        }
        setCurrentWeekStart(newDate);
      };

      const handleCurrentWeekClick = () => {
        const d = new Date();
        const day = d.getDay();
        if (day === 0) d.setDate(d.getDate() + 1);
        else if (day === 6) d.setDate(d.getDate() + 2);
        const newDay = d.getDay();
        const diff = d.getDate() - newDay + (newDay === 0 ? -6 : 1);
        let targetWeekStart = new Date(d.setDate(diff));

        if (sheetRange.min && sheetRange.max) {
          const weekEnd = new Date(targetWeekStart);
          weekEnd.setDate(weekEnd.getDate() + 4);
          if (weekEnd < sheetRange.min) targetWeekStart = new Date(sheetRange.min);
          else if (targetWeekStart > sheetRange.max) {
            const lastWeekStart = new Date(sheetRange.max);
            lastWeekStart.setDate(lastWeekStart.getDate() - (lastWeekStart.getDay() - 1));
            targetWeekStart = lastWeekStart;
          }
        }
        setCurrentWeekStart(targetWeekStart);
      };

      // 1. CSV 데이터 페칭 (팀이 바뀔 때만)
      useEffect(() => {
        if (!team) return;
        setIsLoading(true);

        const exportUrl = SHEET_URLS[team] ? SHEET_URLS[team].replace(/\/edit.*gid=(\d+).*/, '/export?format=csv&gid=$1') : "";
        if (!exportUrl) {
          setIsLoading(false);
          return;
        }

        fetch(`${exportUrl}&t=${Date.now()}`)
          .then(res => res.text())
          .then(csvText => {
            setCachedCsv(csvText);
            setIsLoading(false);
          })
          .catch(e => {
            console.error("데이터 로드 실패", e);
            setIsLoading(false);
          });
      }, [team]);

      // 2. 데이터 파싱 (CSV 데이터, 선생님, 또는 주간 시작일이 바뀔 때)
      useEffect(() => {
        if (!cachedCsv || !teacher || !currentWeekStart) return;

        window.Papa.parse(cachedCsv, {
          header: false,
          skipEmptyLines: true,
          complete: (results) => {
            const data = results.data;
            let headerRowIdx = -1;
            for (let i = 0; i < Math.min(10, data.length); i++) {
              if (data[i] && data[i].length > 3 && data[i][3].replace(/\s+/g, '') === "구분") {
                headerRowIdx = i; break;
              }
            }

            const parsedData = {};
            // 해당 선생님의 실제 시간대만 추출
            const extractedSlots = new Set();
            let tTeacher = "";
            let tTime = "";
            for (let i = headerRowIdx + 1; i < data.length; i++) {
              if (data[i][1] && data[i][1].trim()) tTeacher = data[i][1].trim();
              if (data[i][2] && data[i][2].trim()) tTime = data[i][2].trim();
              if (tTeacher === teacher && tTime) extractedSlots.add(tTime);
            }
            const sortedSlots = Array.from(extractedSlots).sort((a, b) => {
              const getT = (s) => {
                const m = s.match(/(\d+):(\d+)/);
                return m ? parseInt(m[1]) * 60 + parseInt(m[2]) : 9999;
              };
              return getT(a) - getT(b);
            });
            const finalSlots = sortedSlots.length > 0 ? sortedSlots : ["9:30~10:30", "10:30~11:30", "11:30~12:30"];
            finalSlots.forEach(slot => { parsedData[slot] = {}; });
            setTimeSlots(finalSlots);

            if (headerRowIdx === -1) {
              setScheduleData(parsedData);
              return;
            }

            const headerRow = data[headerRowIdx];

            // 시트 전체 날짜 범위 및 특이사항 파악
            let sheetDates = [];
            let specialDates = {}; // { "YYYY-MM-DD": { student, location } }
            for (let j = 4; j < headerRow.length; j++) {
              const cellStr = headerRow[j] || "";
              const match = cellStr.match(/(\d+)\s*[/.]\s*(\d+)/);
              if (match) {
                const d = new Date(currentWeekStart.getFullYear(), parseInt(match[1]) - 1, parseInt(match[2]));
                const dStr = getLocalDateString(d);
                sheetDates.push(d);

                const row3 = (data[headerRowIdx + 1] && data[headerRowIdx + 1][j]) ? data[headerRowIdx + 1][j].trim() : "";
                const row4 = (data[headerRowIdx + 2] && data[headerRowIdx + 2][j]) ? data[headerRowIdx + 2][j].trim() : "";
                const row5 = (data[headerRowIdx + 3] && data[headerRowIdx + 3][j]) ? data[headerRowIdx + 3][j].trim() : "";
                if (row3.includes("간담회") || row3.includes("소양교육") || row4.includes("공휴일") || row4.includes("소양교육")) {
                  specialDates[dStr] = { student: row3, location: row4, memo: row5 };
                }
              }
            }
            if (sheetDates.length > 0) {
              sheetDates.sort((a, b) => a.getTime() - b.getTime());
              setSheetRange({ min: sheetDates[0], max: sheetDates[sheetDates.length - 1] });
            }
            setSpecialDays(specialDates);

            const targetColIndices = {};

            currentDays.forEach(day => {
              const m = day.getMonth() + 1;
              const d = day.getDate();
              const searchPattern = new RegExp(`^0?${m}\\s*[/.]\s*0?${d}`);

              for (let j = 4; j < headerRow.length; j++) {
                if ((headerRow[j] || "").match(searchPattern)) {
                  targetColIndices[getLocalDateString(day)] = j;
                  break;
                }
              }
            });

            let currentTeacherTracker = "";
            let currentTimeTracker = "";
            let currentStudentRow = null;
            let currentLocationRow = null;

            for (let i = headerRowIdx + 1; i < data.length; i++) {
              const row = data[i];
              if (!row || row.length < 4) continue;

              if (row[1] && row[1].trim()) currentTeacherTracker = row[1].trim();
              if (row[2] && row[2].trim()) currentTimeTracker = row[2].trim();

              if (currentTeacherTracker === teacher) {
                const category = row[3] ? row[3].replace(/\s+/g, '') : "";
                if (category === "대상") currentStudentRow = row;
                else if (category === "장소") currentLocationRow = row;
                else if (category.includes("진행")) {
                  const timeKey = currentTimeTracker;
                  if (!parsedData[timeKey]) parsedData[timeKey] = {};

                  currentDays.forEach(day => {
                    const dateStr = getLocalDateString(day);
                    const colIdx = targetColIndices[dateStr];

                    if (colIdx !== undefined) {
                      const rawStu = currentStudentRow ? currentStudentRow[colIdx]?.trim() : "";
                      const rawLoc = currentLocationRow ? currentLocationRow[colIdx]?.trim() : "";

                      let finalStu = rawStu;
                      let finalLoc = rawLoc;
                      let isSpecial = false;
                      const dateStrForSpecial = getLocalDateString(day);
                      if (specialDates[dateStrForSpecial] && (!finalStu && !finalLoc || ["김종철", "표영", "강계환"].includes(teacher.trim())) && timeKey === timeSlots[0]) {
                        finalStu = specialDates[dateStrForSpecial].student;
                        finalLoc = specialDates[dateStrForSpecial].location;
                        isSpecial = true;
                      }

                      let finalStatus = row[colIdx] ? row[colIdx].trim() : "";
                      if (specialDates[dateStrForSpecial] && timeKey === timeSlots[0] && specialDates[dateStrForSpecial].memo) {
                        if (!finalStatus.includes(specialDates[dateStrForSpecial].memo)) {
                          finalStatus = (finalStatus ? finalStatus + ", " : "") + specialDates[dateStrForSpecial].memo;
                        }
                      }

                      parsedData[timeKey][dateStr] = {
                        student: finalStu,
                        location: finalLoc,
                        status: finalStatus,
                        isSpecial: isSpecial
                      };
                    } else {
                      parsedData[timeKey][dateStr] = { student: "", location: "", status: "" };
                    }
                  });

                  currentStudentRow = null;
                  currentLocationRow = null;
                }
              }
            }
            setScheduleData(parsedData);
          }
        });
      }, [cachedCsv, teacher, currentWeekStart]);

      const getStatusColorClass = (statusStr) => {
        if (!statusStr) return "text-gray-800";
        const parts = statusStr.split(',').map(s => s.trim().replace(/\s+/g, ''));
        if (parts.includes("결석") || parts.includes("취소")) return "text-red-600";
        if (parts.includes("휴가") || parts.includes("선생님휴가")) return "text-gray-500";
        return "text-blue-700";
      };

      const parseWeeklyStatus = (statusStr) => {
        if (!statusStr) return { tags: [], memo: "" };
        const parts = statusStr.split(',').map(s => s.trim()).filter(Boolean);
        let tags = [];
        let memos = [];

        const tagKeywords = ['출석', '결석', '취소', '선생님휴가', '휴가'];

        parts.forEach((part, i) => {
          const cleanPart = part.replace(/\s+/g, '');

          // 다인원 출석 패턴 처리 (/ 포함 시)
          if (cleanPart.includes('/')) {
            const subParts = cleanPart.split('/');
            if (subParts.length === 2) {
              const [p1, p2] = subParts;
              const isP1Tag = /^\d+$/.test(p1) || tagKeywords.includes(p1);
              const isP2Tag = /^\d+$/.test(p2) || tagKeywords.includes(p2);

              if (isP1Tag && isP2Tag) {
                let t1 = p1 === '1' ? '출석' : (/^\d+$/.test(p1) ? '출석' + p1 : p1);
                let t2 = p2 === '1' ? '출석' : (/^\d+$/.test(p2) ? '출석' + p2 : p2);

                tags.push(`${t1}/${t2}`);
                return;
              }
            }
          }

          const isNumber = /^\d+$/.test(cleanPart);
          const hasKeyword = tagKeywords.some(k => cleanPart === k);

          let isTag = false;
          if (hasKeyword) {
            isTag = true;
          } else if (isNumber) {
            isTag = (i === 0);
          }

          if (isTag) {
            let displayTag = part;
            if (part === '1') displayTag = '출석';
            else if (isNumber) displayTag = `출석${part}`;
            tags.push(displayTag);
          } else {
            memos.push(part);
          }
        });

        return { tags, memo: memos.join(', ') };
      };

      return (
        <div className="min-h-[100dvh] flex flex-col bg-gray-50 font-sans">
          <header className="bg-blue-600 text-white px-4 pb-4 pt-safe-4 shadow-lg z-40 flex justify-between items-center relative">
            <div className="flex items-center">
              <div className="flex flex-col">
                <div className="flex items-center mb-1">
                  <img src="Logo_of_Seoul.jpg" alt="서울시 로고" className="h-7 bg-white px-2 py-1 rounded-md object-contain mr-2" onError={(e) => e.target.style.display = 'none'} />
                  <h1 className="font-black text-xl leading-tight">성동노인종합복지관</h1>
                </div>
                <p className="text-base font-bold text-yellow-300">디지털교육 서포터즈</p>
                <p className="text-base opacity-95 flex items-center mt-1 font-bold">
                  <User className="w-4 h-4 mr-1" /> [{team}] {teacher.replace(/\n/g, ' ')} 선생님
                </p>
              </div>
            </div>
            <button onClick={onNavigateBack} className="text-xs flex flex-col items-center font-bold p-2 rounded-lg shadow-md transition-all touch-manipulation bg-blue-800 text-white opacity-90 active:scale-95">
              <Home className="w-5 h-5 mb-1" /> 처음으로
            </button>
          </header>

          <main className="flex-1 flex flex-col w-full mx-auto p-3 sm:p-5 lg:p-8">
            <div className="bg-white rounded-2xl shadow-xl border border-gray-200 flex flex-col flex-1 overflow-hidden">
              <div className="shrink-0 bg-white px-4 sm:px-6 pt-5 pb-4 shadow-sm relative z-10 flex flex-col items-center border-b border-gray-100">
                <h2 className="text-[18px] sm:text-2xl font-black text-gray-900 mb-4 flex items-center gap-2">
                  <MainCalendarIcon className="w-6 h-6 sm:w-7 sm:h-7 text-blue-600" />
                  나의 주간 일정 보기
                </h2>
                <div className="flex items-center gap-2 w-full max-w-sm md:max-w-md lg:max-w-lg mx-auto">
                  <button onClick={() => changeWeek(-1)} className="w-12 h-12 md:w-14 md:h-14 flex items-center justify-center border-2 border-gray-300 rounded-xl bg-white shadow-sm hover:bg-gray-50 active:bg-gray-100 text-gray-700 shrink-0 transition-all touch-manipulation">
                    <svg className="w-7 h-7 md:w-8 md:h-8" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z" /></svg>
                  </button>
                  <div className="flex-1 h-12 md:h-14 flex items-center justify-center border-2 border-blue-400 rounded-xl bg-[#f0f7ff] text-center shadow-sm">
                    <h2 className="font-extrabold text-[#1e3a8a] text-[18px] sm:text-[22px] md:text-[24px] tracking-tight">{startMonth}/{startDay} ~ {endMonth}/{endDay}</h2>
                  </div>
                  <button onClick={handleCurrentWeekClick} className="px-4 h-12 md:h-14 border-2 border-blue-600 rounded-xl font-bold bg-blue-600 text-white shadow-sm hover:bg-blue-700 active:bg-blue-800 shrink-0 text-[16px] md:text-[18px] transition-all touch-manipulation">이번 주</button>
                  <button onClick={() => changeWeek(1)} className="w-12 h-12 md:w-14 md:h-14 flex items-center justify-center border-2 border-gray-300 rounded-xl bg-white shadow-sm hover:bg-gray-50 active:bg-gray-100 text-gray-700 shrink-0 transition-all touch-manipulation">
                    <svg className="w-7 h-7 md:w-8 md:h-8" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z" /></svg>
                  </button>
                </div>
                {notice && <div className="mt-2 text-red-600 font-bold text-center animate-fadeIn">{notice}</div>}
                {isLoading && <div className="mt-3 text-sm sm:text-base text-red-600 font-bold flex items-center animate-pulse"><Clock className="w-4 h-4 mr-1 animate-spin" />일정 데이터를 불러오는 중...</div>}
              </div>

              <div className="flex-1 overflow-x-auto overflow-y-auto bg-gray-50/50 p-0">
                <div className="min-w-[650px] w-full md:w-[92%] lg:w-[88%] max-w-[1600px] bg-white rounded-xl shadow-sm border-2 border-gray-300 overflow-hidden mx-auto my-2 sm:my-4">
                  <table className="w-full table-fixed text-center border-collapse">
                    <thead>
                      <tr className="bg-[#eef2ff] border-b-2 border-gray-300">
                        <th className="w-[12%] py-2 md:py-3 border-r-2 border-gray-300 font-black text-gray-800 text-[clamp(1rem,2.2vw,1.3rem)]">시간</th>
                        {currentDays.map((day, i) => {
                          const dateStr = getLocalDateString(day);
                          const isToday = dateStr === getLocalDateString(new Date());

                          return (
                            <th key={i} style={{ width: '17.6%' }} className={`py-2 md:py-3 font-black text-[clamp(1rem,2.2vw,1.3rem)] tracking-tight transition-all ${isToday ? 'border-l-4 border-r-4 border-t-4 border-blue-600 text-blue-700 bg-blue-50' : 'border-r-2 border-gray-300 text-blue-900 last:border-0'}`}>
                              {day.getMonth() + 1}/{day.getDate()} ({weekDays[i]})
                            </th>
                          );
                        })}
                      </tr>
                    </thead>
                    <tbody>
                      {timeSlots.map((time, idx) => (
                        <tr key={idx} className="border-b-2 border-gray-300 last:border-0">
                          <td className="py-3 md:py-5 px-1 border-r-2 border-gray-300 bg-[#f8fafc] font-black text-blue-800 text-[clamp(0.95rem,2.1vw,1.25rem)] whitespace-pre-line leading-tight">
                            {time.replace('~', '\n~\n')}
                          </td>
                          {currentDays.map((day, i) => {
                            const dateStr = getLocalDateString(day);
                            const isToday = dateStr === getLocalDateString(new Date());
                            const specialDayInfo = specialDays && specialDays[dateStr];
                            const hasRealSchedule = timeSlots.some(t => {
                              const d = scheduleData?.[t]?.[dateStr];
                              return d && d.student && d.student.trim() !== "" && d.student.trim() !== "간담회";
                            });
                            const isSpecialDayMerged = specialDayInfo && !hasRealSchedule;

                            // 1. 특별한 날(간담회/공휴일) 병합 처리
                            if (isSpecialDayMerged && idx > 0) return null;

                            const isLastSlot = idx === timeSlots.length - 1;
                            const todayBorderClass = isToday ? `border-l-4 border-r-4 ${(isSpecialDayMerged || isLastSlot) ? 'border-b-4' : ''} border-blue-600 z-10` : 'border-r-2 border-gray-300 last:border-0';

                            const cellData = isSpecialDayMerged ? {
                              student: specialDayInfo.student,
                              location: specialDayInfo.location,
                              status: specialDayInfo.memo,
                              isSpecial: true
                            } : scheduleData?.[time]?.[dateStr];

                            if (!cellData || (!cellData.student && !cellData.location && !cellData.status)) {
                              return (
                                <td key={i} className={`p-0 align-top hover:bg-gray-50 transition-colors overflow-hidden ${todayBorderClass}`}>
                                  <div className="flex items-center justify-center h-full min-h-[110px] text-gray-300 font-bold text-[clamp(1rem,2vw,1.2rem)]">일정 없음</div>
                                </td>
                              );
                            }

                            const parsedStatus = parseWeeklyStatus(cellData.status);
                            const isAssistant = cellData.student && cellData.student.includes("보조강사");
                            const isKyungrodang = (cellData.student || "").includes("경로당") || (cellData.student || "").includes("복지관") || (cellData.location || "").includes("경로당") || ((cellData.location || "").includes("복지관") && (cellData.location || "").trim() !== "복지관");
                            const cardBgClass = isAssistant ? "bg-[#FFFF00]" : isKyungrodang ? "bg-orange-100" : "bg-white";

                            let cellBgClass = cardBgClass;
                            if (specialDayInfo) {
                              cellBgClass = "bg-red-200";
                            }

                            return (
                              <td key={i} rowSpan={isSpecialDayMerged ? 3 : 1} className={`${cellBgClass} p-0 align-middle transition-all overflow-hidden h-full hover:brightness-95 ${todayBorderClass}`}>
                                <div className={`flex flex-col gap-1 ${isSpecialDayMerged ? 'p-4 justify-center' : 'p-3 justify-center'} items-center h-full min-h-[110px] overflow-hidden w-full max-w-full`}>
                                  {parsedStatus.tags.length > 0 && !cellData.student?.includes("간담회") && (
                                    <div className="flex flex-wrap gap-1.5 justify-center w-full mb-1">
                                      {parsedStatus.tags.map((tag, tIdx) => {
                                        let tagStyle = "bg-blue-100 text-blue-700 border-blue-300";
                                        if (tag.includes('결석')) tagStyle = "bg-red-100 text-red-700 border-red-300";
                                        else if (tag.includes('취소')) tagStyle = "bg-orange-100 text-orange-700 border-orange-300";
                                        else if (tag.includes('휴가')) tagStyle = "bg-gray-200 text-gray-700 border-gray-400";
                                        else if (tag.includes('출석') || /^\d+/.test(tag)) tagStyle = "bg-blue-500 text-white border-blue-600 shadow-inner";
                                        return (
                                          <span key={tIdx} className={`px-2.5 py-1 rounded-lg text-[clamp(0.75rem,1.5vw,1rem)] font-extrabold border shadow-sm leading-none whitespace-nowrap overflow-hidden text-ellipsis max-w-full ${tagStyle}`}>
                                            {tag}
                                          </span>
                                        );
                                      })}
                                    </div>
                                  )}
                                  {cellData.student && <div className={`font-bold text-gray-900 text-[clamp(1.1rem,2.6vw,1.7rem)] leading-tight break-all whitespace-pre-wrap text-center w-full`}>{cellData.student.replace(/\n/g, ' ').replace(/부처님오신날/g, '부처님\n오신날').replace(/보조강사\s*/g, '보조강사\n').replace(/\//g, '/\n').trim()}</div>}
                                  {cellData.location && cellData.location !== "복지관" && team !== '취업팀' && <div className={`text-gray-600 text-[clamp(0.9rem,2.1vw,1.35rem)] font-bold break-all whitespace-pre-wrap text-center max-w-full leading-tight mt-1`}>{cellData.location.replace(/대체공휴일/g, '대체\n공휴일')}</div>}
                                  {parsedStatus.memo && <div className={`font-bold text-[clamp(0.9rem,2.1vw,1.35rem)] leading-snug break-words whitespace-pre-wrap text-center mt-1 w-full ${getStatusColorClass(cellData.status)}`}>{parsedStatus.memo.replace(/대체공휴일/g, '대체\n공휴일')}</div>}
                                </div>
                              </td>
                            );
                          })}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </main>
        </div>
      );
    }

    // =====================================================================
    // 🔀 5. 총괄 부모 컴포넌트
    // =====================================================================
    function RootApp() {
      const [isFirebaseLoaded, setIsFirebaseLoaded] = useState(!!window.FirebaseAPI);
      const [currentView, setCurrentView] = useState(() => getSessionItem('sungdong_current_view', 'main'));
      const [selectedTeamForSchedule, setSelectedTeamForSchedule] = useState(() => getSavedItem('sungdong_schedule_team', ''));
      const [selectedTeacherForWeekly, setSelectedTeacherForWeekly] = useState(() => getSavedItem('sungdong_weekly_teacher', ''));

      useEffect(() => {
        if (!isFirebaseLoaded) {
          const handleLoad = () => setIsFirebaseLoaded(true);
          window.addEventListener('firebaseLoaded', handleLoad);
          return () => window.removeEventListener('firebaseLoaded', handleLoad);
        }
      }, [isFirebaseLoaded]);

      useEffect(() => { setSessionItem('sungdong_current_view', currentView); }, [currentView]);
      useEffect(() => { setSavedItem('sungdong_schedule_team', selectedTeamForSchedule); }, [selectedTeamForSchedule]);
      useEffect(() => { setSavedItem('sungdong_weekly_teacher', selectedTeacherForWeekly); }, [selectedTeacherForWeekly]);

      useEffect(() => {
        if (!isFirebaseLoaded || !window.FirebaseAPI) return;

        const { auth, db, signInAnonymously, signInWithCustomToken, onAuthStateChanged, doc, onSnapshot } = window.FirebaseAPI;
        let unsubscribeData = null;

        const initAuthAndPreload = async () => {
          try {
            if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
              await signInWithCustomToken(auth, window.__initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (error) {
            console.error("⚠️ 데이터 사전 로드 인증 에러:", error);
          }
        };

        initAuthAndPreload();

        const unsubscribeAuth = onAuthStateChanged(auth, (user) => {
          if (unsubscribeData) {
            unsubscribeData();
            unsubscribeData = null;
          }

          if (user) {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'schedules', 'main_data');
            unsubscribeData = onSnapshot(docRef,
              (docSnap) => {
              },
              (error) => {
                console.error("⚠️ 데이터 사전 로드 에러:", error);
              }
            );
          }
        });

        return () => {
          unsubscribeAuth();
          if (unsubscribeData) unsubscribeData();
        };
      }, [isFirebaseLoaded]);

      if (!isFirebaseLoaded) {
        return (
          <div className="fixed inset-0 overflow-hidden bg-[#f9fafb] flex flex-col z-50">
            <div className="flex-1 flex items-center justify-center">
              <div className="w-[120px] h-[120px] bg-[#2563EB] rounded-3xl flex flex-col items-center justify-center text-white font-bold text-3xl shadow-xl animate-pulse">
                <div className="mb-1">업무</div>
                <div>일지</div>
              </div>
            </div>
            <div className="pb-12 text-center animate-fadeIn">
              <h1 className="text-3xl font-black text-gray-800 mb-1">성동노인종합복지관</h1>
              <h2 className="text-xl font-bold text-gray-600">디지털교육 서포터즈</h2>
            </div>
          </div>
        );
      }

      if (currentView === 'classroom') {
        return <ClassroomApp onNavigateBack={() => setCurrentView('main')} />;
      }

      if (currentView === 'dailySchedule') {
        return <DailyScheduleApp initialTeam={selectedTeamForSchedule} onNavigateBack={() => setCurrentView('main')} onTeamChange={(team) => setSelectedTeamForSchedule(team)} />;
      }

      if (currentView === 'myWeeklySchedule') {
        return <MyWeeklyScheduleApp team={selectedTeamForSchedule} teacher={selectedTeacherForWeekly} onNavigateBack={() => setCurrentView('main')} />;
      }

      if (currentView === 'studentSearch') {
        return <StudentSearchApp onNavigateBack={() => setCurrentView('main')} />;
      }

      return <MainApp
        onNavigateToClassroom={() => setCurrentView('classroom')}
        onNavigateToDailySchedule={(team) => {
          setSelectedTeamForSchedule(team);
          try { window.sessionStorage.removeItem('sungdong_daily_schedule_date'); } catch (e) { }
          setCurrentView('dailySchedule');
        }}
        onNavigateToMyWeeklySchedule={() => {
          const t = getSavedItem('sungdong_team', '');
          const th = getSavedItem('sungdong_teacher', '');
          setSelectedTeamForSchedule(t);
          setSelectedTeacherForWeekly(th);
          setCurrentView('myWeeklySchedule');
        }}
        onNavigateToStudentSearch={() => setCurrentView('studentSearch')}
      />;
    }

    const root = window.ReactDOM.createRoot(document.getElementById('root'));
    root.render(<RootApp />);
  </script>

  <style>
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fadeIn {
      animation: fadeIn 0.3s ease-out forwards;
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .animate-scaleIn {
      animation: scaleIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    input[type="date"].opacity-0::-webkit-calendar-picker-indicator {
      position: absolute;
      top: -10px;
      left: -10px;
      right: -10px;
      bottom: -10px;
      width: auto;
      height: auto;
      opacity: 0;
      cursor: pointer;
    }

    .pt-safe-4 {
      padding-top: calc(1rem + env(safe-area-inset-top)) !important;
    }

    .pt-safe-6 {
      padding-top: calc(1.5rem + env(safe-area-inset-top)) !important;
    }

    .safe-top-btn {
      top: calc(1rem + env(safe-area-inset-top)) !important;
    }

    @media (min-width: 640px) {
      .sm\:pt-safe-8 {
        padding-top: calc(2rem + env(safe-area-inset-top)) !important;
      }
    }

    @media (min-width: 768px) {
      .md\:pt-safe-8 {
        padding-top: calc(2rem + env(safe-area-inset-top)) !important;
      }

      .safe-top-btn {
        top: calc(1.5rem + env(safe-area-inset-top)) !important;
      }
    }
  </style>
</body>
