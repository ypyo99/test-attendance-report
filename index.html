  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const canvas = document.createElement('canvas');
      canvas.width = 512;
      canvas.height = 512;
      const ctx = canvas.getContext('2d');

      ctx.fillStyle = '#2563EB';
      ctx.fillRect(0, 0, 512, 512);

      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 120px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('업무', 256, 200);
      ctx.fillText('일지', 256, 360);

      const iconUrl = canvas.toDataURL('image/png');

      const manifest = {
        name: "성동노인종합복지관 디지털교육 서포터즈",
        short_name: "업무일지",
        start_url: window.location.href.split('?')[0].split('#')[0],
        display: "standalone",
        background_color: "#f9fafb",
        theme_color: "#2563EB",
        icons: [
          { src: iconUrl, sizes: "192x192", type: "image/png", purpose: "any maskable" },
          { src: iconUrl, sizes: "512x512", type: "image/png", purpose: "any maskable" }
        ]
      };

      const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
      const manifestUrl = URL.createObjectURL(blob);
      const link = document.createElement('link');
      link.rel = 'manifest';
      link.href = manifestUrl;
      document.head.appendChild(link);
    });
  </script>

    const getLocalDateString = (d) => {
      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    };

    const getDirectImageUrl = (url) => {
      if (!url) return '';
      let finalUrl = url.trim();
      if (finalUrl.startsWith('//')) finalUrl = 'https:' + finalUrl;
      if (finalUrl.startsWith('data:')) return finalUrl;

      // [신규] =IMAGE("URL") 형식에서 URL 추출 (더욱 견고하게 수정)
      if (finalUrl.toUpperCase().startsWith('=IMAGE(')) {
        const formulaMatch = finalUrl.match(/IMAGE\s*\(\s*["']?\s*([^"'\s,)]+)/i);
        if (formulaMatch && formulaMatch[1]) finalUrl = formulaMatch[1].replace(/["']/g, '');
      }

      let fileId = null;
      if (finalUrl.includes('drive.google.com/file/d/')) {
        const match = finalUrl.match(/\/d\/([a-zA-Z0-9_-]+)/);
        if (match && match[1]) fileId = match[1];
      } else if (finalUrl.includes('drive.google.com/uc')) {
        const match = finalUrl.match(/id=([a-zA-Z0-9_-]+)/);
        if (match && match[1]) fileId = match[1];
      } else if (finalUrl.includes('drive.google.com/open?id=')) {
        const match = finalUrl.match(/id=([a-zA-Z0-9_-]+)/);
        if (match && match[1]) fileId = match[1];
      }

      if (fileId) return `https://drive.google.com/thumbnail?id=${fileId}&sz=w1000`;
      return finalUrl;
    };

      if (val === undefined || val === null) return '';
      const strVal = String(val);

      const isGmt = /[a-zA-Z]{3} [a-zA-Z]{3} \d{1,2} \d{4}/.test(strVal);
      if (isIso || isGmt) {
        const d = new Date(strVal);
        if (!isNaN(d.getTime())) {
          return `${d.getMonth() + 1}/${d.getDate()}`;
        }

        if (!isSigning && currentUrl && (currentUrl.startsWith('http') || currentUrl.startsWith('data:'))) {

          }

        const canvas = canvasRef.current;

          ctx.lineWidth = 3;
          ctx.strokeStyle = '#000';
          ctx.lineCap = 'round';
          ctx.lineJoin = 'round';
        }

      const clearCanvasInternal = () => {
        const canvas = canvasRef.current;
        if (canvas) {
          const ctx = canvas.getContext('2d');
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
      };

      useEffect(() => {
        if (currentUrl === "") {
          clearCanvasInternal();
          setLastBase64("");
        }
      }, [currentUrl]);

      const getCoordinates = (event) => {
        const canvas = canvasRef.current;
        if (!canvas) return { x: 0, y: 0 };
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let clientX, clientY;
        if (event.touches && event.touches.length > 0) {
          clientX = event.touches[0].clientX;
          clientY = event.touches[0].clientY;
        } else {
          clientX = event.clientX;
          clientY = event.clientY;
        }
        return {
          x: (clientX - rect.left) * scaleX,
          y: (clientY - rect.top) * scaleY
        };
      };

      const startDrawing = (e) => {
        if (disabled || !isSigning) return;
        e.preventDefault();
        const { x, y } = getCoordinates(e);
        const ctx = canvasRef.current.getContext('2d');
        ctx.beginPath();
        ctx.moveTo(x, y);
        setIsDrawing(true);
      };

      const draw = (e) => {
        if (!isDrawing || disabled || !isSigning) return;
        e.preventDefault();
        const { x, y } = getCoordinates(e);
        const ctx = canvasRef.current.getContext('2d');
        ctx.lineTo(x, y);
        ctx.stroke();
      };

      const stopDrawing = () => {
        if (!isDrawing || disabled || !isSigning) return;
        setIsDrawing(false);
        hasDrawnRef.current = true;
        if (canvasRef.current) {
          const base64 = canvasRef.current.toDataURL('image/png');
          setLastBase64(base64);
          onSave(base64);
        }
      };

      const toggleSignMode = () => {
        if (disabled) return;
        if (!isSigning) {
          setIsSigning(true);
          setShowSavedImg(false);
          clearCanvasInternal();
          setLastBase64("");
          hasDrawnRef.current = false;
        } else {
          setIsSigning(false);
          if (hasDrawnRef.current && canvasRef.current) {
            const base64 = canvasRef.current.toDataURL('image/png');
            setLastBase64(base64);
            setShowSavedImg(true);
            onSave(base64);
            if (onTriggerSave) {
              setTimeout(() => onTriggerSave(base64), 100);
            }
          } else {
            setLastBase64("");
            setShowSavedImg(false);
            clearCanvasInternal();
            onSave("");
            if (onTriggerSave) {
              setTimeout(() => onTriggerSave("__DELETE__"), 100);
            }
          }
        }
      };

      const restartSign = () => {
        if (disabled) return;
        clearCanvasInternal();
        setLastBase64("");
        setShowSavedImg(false);
        hasDrawnRef.current = false;
        onSave("");
      };

      const cancelSign = () => {
        setIsSigning(false);
        clearCanvasInternal();
        setLastBase64("");
        if (currentUrl && (currentUrl.startsWith('http') || currentUrl.startsWith('data:'))) {
          setShowSavedImg(true);
          if (currentUrl.startsWith('data:')) setLastBase64(currentUrl);
        }
        onSave(currentUrl || "");
      };

      const handleImgLoad = () => {
        setIsImgLoading(false);
        clearCanvasInternal();
      };

      const displayImgUrl = (currentUrl && currentUrl.startsWith('http')) ? getDirectImageUrl(currentUrl) : (currentUrl && currentUrl.startsWith('data:') ? currentUrl : lastBase64);

      return (
        <div className="flex flex-col items-center border-2 border-blue-300 p-3 bg-blue-50/50 rounded-2xl mt-3 shadow-sm">
          <div className="flex justify-between w-full mb-2 px-1 gap-2 items-center">
            <span className="text-blue-700 font-bold text-sm flex items-center gap-1">
              <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
              수업 싸인
            </span>
            <div className="flex gap-2">
              <button
                type="button"
                onClick={toggleSignMode}
                disabled={disabled}
                className={`text-sm sm:text-[15px] font-black px-3 py-1.5 rounded-xl shadow-md transition-all active:scale-95 border disabled:opacity-50 disabled:cursor-not-allowed ${isSigning ? 'bg-green-500 hover:bg-green-600 text-white border-green-600 ring-4 ring-green-100' : 'bg-blue-500 hover:bg-blue-600 text-white border-blue-600'}`}
              >
                {isSigning ? '싸인완료/저장' : '싸인하기'}
              </button>
              {isSigning && (
                <>
                  <button type="button" onClick={restartSign} disabled={disabled} className="text-sm sm:text-[15px] font-black text-red-600 hover:text-red-700 px-3 py-1.5 bg-white border-2 border-red-200 rounded-xl shadow-sm disabled:opacity-50 transition-all active:scale-95">다시 하기</button>
                  <button type="button" onClick={cancelSign} className="text-sm sm:text-[15px] font-black text-gray-600 hover:text-gray-800 px-3 py-1.5 bg-white border-2 border-gray-200 rounded-xl shadow-sm transition-all active:scale-95">취소</button>
                </>
              )}
            </div>
          </div>
          <div className="relative w-full max-w-[400px] h-[140px] group">
            <canvas
              ref={canvasRef}
              width={400}
              height={140}
              className={`absolute inset-0 border-2 ${isSigning ? 'border-blue-400 ring-4 ring-blue-100' : 'border-gray-200'} bg-white touch-none w-full h-full rounded-xl shadow-inner z-0 transition-all ${isSigning ? 'pointer-events-auto' : 'pointer-events-none'}`}
              onMouseDown={startDrawing}
              onMouseMove={draw}
              onMouseUp={stopDrawing}
              onMouseLeave={stopDrawing}
              onTouchStart={startDrawing}
              onTouchMove={draw}
              onTouchEnd={stopDrawing}
            />

            {showSavedImg && displayImgUrl && (
              <div
                className="absolute inset-0 z-10 flex items-center justify-center bg-white border-2 border-blue-300 rounded-xl shadow-inner overflow-hidden cursor-zoom-in"
                onClick={() => setShowModal(true)}
                title="클릭하면 크게 봅니다"
              >
                {/* 1. 로딩 중일 때 보여줄 백그라운드 싸인 (끊김 방지) */}
                {isImgLoading && lastBase64 && (
                  <img
                    src={lastBase64}
                    alt="Background"
                    className="absolute inset-0 w-full h-full object-contain opacity-50 blur-[0.5px]"
                  />
                )}

                {/* 2. 로딩 스피너 */}
                {isImgLoading && (
                  <div className="absolute inset-0 z-30 flex items-center justify-center bg-white/40">
                    <div className="w-6 h-6 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                  </div>
                )}

                {/* 3. 실제 이미지 */}
                <img
                  key={displayImgUrl}
                  src={displayImgUrl}
                  alt="Signature"
                  className={`max-h-full max-w-full object-contain transition-opacity duration-300 ${isImgLoading && currentUrl && currentUrl.startsWith('http') ? 'opacity-0' : 'opacity-100'}`}
                  onLoad={handleImgLoad}
                  onError={() => setIsImgLoading(false)}
                />

                {!isSigning && !isImgLoading && (
                  <div className="absolute bottom-2 right-2 bg-black/40 text-white p-1 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity">
                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"></path></svg>
                  </div>
                )}
              </div>
            )}
          </div>

          {showModal && displayImgUrl && (
            <div className="fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-4 animate-fadeIn" onClick={() => setShowModal(false)}>
              <div className="relative max-w-4xl w-full bg-white rounded-3xl p-2 shadow-2xl animate-scaleIn">
                <button
                  className="absolute -top-12 right-0 text-white hover:text-gray-300 transition-colors"
                  onClick={(e) => { e.stopPropagation(); setShowModal(false); }}
                >
                  <svg className="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
                <div className="bg-blue-50 rounded-2xl p-4 sm:p-8 flex items-center justify-center min-h-[300px]">
                  <img
                    src={displayImgUrl}
                    alt="Enlarged Signature"
                    className="max-h-[70vh] max-w-full object-contain shadow-sm"
                  />
                </div>
                <div className="py-4 text-center">
                  <p className="text-gray-800 font-black text-xl">수업 싸인 확대 보기</p>
                  <p className="text-gray-500 font-bold">화면 아무 곳이나 누르면 닫힙니다.</p>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // =====================================================================
    // 🖥️ 1. 메인 업무일지 프로그램
    // =====================================================================
    function MainApp({ onNavigateToClassroom, onNavigateToDailySchedule, onNavigateToStudentSearch, onNavigateToMyWeeklySchedule }) {
      const [selectedTeam, setSelectedTeam] = useState(() => getSavedItem('sungdong_team', ""));
      const [currentUser, setCurrentUser] = useState(() => getSavedItem('sungdong_teacher', ""));
      const [date, setDate] = useState(() => getInitialWeekday());
      const [isLoggedIn, setIsLoggedIn] = useState(() => getSessionItem('sungdong_is_logged_in', "") === 'true');
      const [refreshTrigger, setRefreshTrigger] = useState(0);
      const [teachers, setTeachers] = useState([]);
      const [allScheduleData, setAllScheduleData] = useState({});
      const [specialDayData, setSpecialDayData] = useState(null);
      const [isFetchingTeachers, setIsFetchingTeachers] = useState(false);
      const [isFetchingSchedule, setIsFetchingSchedule] = useState(false);
      const [isSyncing, setIsSyncing] = useState(false);
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [records, setRecords] = useState([]);
      const [errorMessage, setErrorMessage] = useState("");
      const [showSavePopup, setShowSavePopup] = useState(false);
      const [holidayDates, setHolidayDates] = useState([]);

      const [showValidationError, setShowValidationError] = useState(false);
      const [validationErrorMsg, setValidationErrorMsg] = useState("");

      const [saveProgress, setSaveProgress] = useState([]);
      const [isSaveComplete, setIsSaveComplete] = useState(false);

      const [showRepeatConfirm, setShowRepeatConfirm] = useState(false);
      const [repeatTargetDates, setRepeatTargetDates] = useState([]);

      const [specialAlerts, setSpecialAlerts] = useState([]);

      const [teamCsvText, setTeamCsvText] = useState("");

      const [studentCounts, setStudentCounts] = useState({});
      const [selectedStudentDates, setSelectedStudentDates] = useState(null);
      const [shifts, setShifts] = useState(["9:30~10:30", "10:30~11:30", "11:30~12:30"]);

      // 💡 [추가] 구글 시트 데이터에서 실제 수업 시간대 추출 및 정렬 로직
      useEffect(() => {
        if (!allScheduleData || Object.keys(allScheduleData).length === 0) {
          if (selectedTeam === "3팀") setShifts(["13:00~14:00", "14:00~15:00", "15:00~16:00"]);
          else setShifts(["9:30~10:30", "10:30~11:30", "11:30~12:30"]);
          return;
        }
        const extracted = new Set();
        Object.values(allScheduleData).forEach(day => {
          Object.keys(day).forEach(s => { if (s && s.trim() !== "") extracted.add(s); });
        });
        if (extracted.size > 0) {
          const sorted = Array.from(extracted).sort((a, b) => {
            const getT = (s) => {
              const m = s.match(/(\d+):(\d+)/);
              return m ? parseInt(m[1]) * 60 + parseInt(m[2]) : 0;
            };
            return getT(a) - getT(b);
          });
          setShifts(sorted);
        }
      }, [allScheduleData, selectedTeam]);

      const [hiddenLogs, setHiddenLogs] = useState({});
      const toggleHideLog = (index) => {
        setHiddenLogs(prev => ({ ...prev, [index]: !prev[index] }));
      };

      const lastTagClickRef = useRef({ time: 0, index: -1, sIdx: -1, tag: '' });

      const touchStartX = useRef(null);
      const touchStartY = useRef(null);
      const mainTouchStartX = useRef(null);
      const mainTouchStartY = useRef(null);
      const [pullDistance, setPullDistance] = useState(0);

      const isLoginReady = currentUser && currentUser.trim() !== "" && teachers.includes(currentUser) && !isFetchingTeachers && !isFetchingSchedule;

      useEffect(() => {
        document.documentElement.style.overscrollBehaviorY = 'none';
        document.body.style.overscrollBehaviorY = 'none';
        return () => {
          document.documentElement.style.overscrollBehaviorY = 'auto';
          document.body.style.overscrollBehaviorY = 'auto';
        };
      }, [isLoggedIn]);

      useEffect(() => { setSavedItem('sungdong_team', selectedTeam); }, [selectedTeam]);
      useEffect(() => { setSavedItem('sungdong_teacher', currentUser); }, [currentUser]);
      useEffect(() => { setSessionItem('sungdong_is_logged_in', isLoggedIn ? 'true' : ''); }, [isLoggedIn]);

      useEffect(() => {
        const handleBeforeUnload = (e) => {
          if (isSubmitting) {
            e.preventDefault();
            e.returnValue = '';
          }
        };

        const handlePopState = (e) => {
          if (isSubmitting) {
            window.history.pushState(null, null, window.location.href);
            alert("데이터 저장 중입니다.\n안전한 저장을 위해 잠시만 기다려주세요.");
          }
        };

        if (isSubmitting) {
          window.addEventListener('beforeunload', handleBeforeUnload);
          window.history.pushState(null, null, window.location.href);
          window.addEventListener('popstate', handlePopState);
        }

        return () => {
          window.removeEventListener('beforeunload', handleBeforeUnload);
          window.removeEventListener('popstate', handlePopState);
        };
      }, [isSubmitting]);

      const [logs, setLogs] = useState({
        0: { student: "", status: "", location: "", selectedTags: [[]], memo: "", headcount: "" },
        1: { student: "", status: "", location: "", selectedTags: [[]], memo: "", headcount: "" },
        2: { student: "", status: "", location: "", selectedTags: [[]], memo: "", headcount: "" },
        3: { student: "", status: "", location: "", selectedTags: [[]], memo: "", headcount: "" },
        4: { student: "", status: "", location: "", selectedTags: [[]], memo: "", headcount: "" },
        5: { student: "", status: "", location: "", selectedTags: [[]], memo: "", headcount: "" }
      });

      const ATTENDANCE_TAGS = ['1', '결석', '취소', '선생님휴가'];
      const RENDER_TAGS = ['1', '결석', '취소', '선생님휴가'];



      const fetchTeachersFromSheet = async (team) => {
        setIsFetchingTeachers(true);
        try {
          const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getTeachers&team=${team}&t=${Date.now()}`);
          if (response.ok) {
            const data = await response.json();
            const fetchedTeachers = data.teachers || [];
            setTeachers(fetchedTeachers);
            window.localStorage.setItem(`sungdong_teachers_${team}`, JSON.stringify(fetchedTeachers));
          }
        } catch (error) {
          console.error("⚠️ 선생님 목록 로딩 에러:", error);
        } finally {
          setIsFetchingTeachers(false);
        }
      };

      useEffect(() => {
        if (!selectedTeam) { setTeachers([]); setCurrentUser(""); return; }
        const cachedTeachers = window.localStorage.getItem(`sungdong_teachers_${selectedTeam}`);
        if (cachedTeachers) {
          try {
            const parsed = JSON.parse(cachedTeachers);
            if (parsed && parsed.length > 0) {
              setTeachers(parsed);
              return;
            }
          } catch (e) { }
        }
        fetchTeachersFromSheet(selectedTeam);
      }, [selectedTeam]);

      useEffect(() => {
        if (!selectedTeam) {
          setTeamCsvText("");
          return;
        }
        const exportUrl = SHEET_URLS[selectedTeam] ? SHEET_URLS[selectedTeam].replace(/\/edit.*gid=(\d+).*/, '/export?format=csv&gid=$1') : "";
        if (!exportUrl) return;

        fetch(`${exportUrl}&t=${Date.now()}`)
          .then(res => res.text())
          .then(text => setTeamCsvText(text))
          .catch(err => console.error("팀 CSV 로드 실패:", err));
      }, [selectedTeam, refreshTrigger]);

      const parseStudentSpecificStatus = (cellStatus, cellStudent, targetName) => {
        const cellNames = cellStudent.split(/[/,]/).map(s => s.trim().split('(')[0].trim()).filter(Boolean);
        const nameIdx = cellNames.indexOf(targetName);

        if (nameIdx !== -1 && cellStatus.includes('/')) {
          const rawParts = cellStatus.split(',').map(s => s.trim()).filter(Boolean);
          let tagParts = [];
          let memoParts = [];
          let isMemoStarted = false;

          for (let i = 0; i < rawParts.length; i++) {
            const part = rawParts[i];
            if (!isMemoStarted) {
              const subParts = part.split('/').map(p => p.trim());
              const isAllTags = subParts.every(p => {
                if (p === "") return true;
                const cleanP = p.replace(/\s+/g, '');
                if (ATTENDANCE_TAGS.includes(cleanP)) return true;
                const spaceParts = p.split(/\s+/);
                return spaceParts.every(sp => ATTENDANCE_TAGS.includes(sp));
              });
              if (isAllTags) {
                tagParts.push(part);
              } else {
                isMemoStarted = true;
                memoParts.push(part);
              }
            } else {
              memoParts.push(part);
            }
          }

          if (tagParts.length > 0) {
            const combinedTagStr = tagParts.join(',');
            const slashSegments = combinedTagStr.split('/');
            if (slashSegments.length > nameIdx) {
              return slashSegments[nameIdx] + (memoParts.length > 0 ? ', ' + memoParts.join(', ') : '');
            }
          }
        }
        return cellStatus;
      };

      useEffect(() => {
        if (!teamCsvText || !window.Papa || !date) return;

        // shifts 상태를 사용함
        const students = shifts.map((_, i) => logs[i]?.student);
        if (students.every(s => !s || !s.trim())) {
          setStudentCounts({});
        }

        window.Papa.parse(teamCsvText, {
          header: false,
          skipEmptyLines: true,
          complete: (results) => {
            const data = results.data;
            let newCounts = { 0: null, 1: null, 2: null };

            let headerRowIdx = -1;
            for (let i = 0; i < Math.min(10, data.length); i++) {
              if (data[i] && data[i].length > 3 && data[i][3].replace(/\s+/g, '') === "구분") {
                headerRowIdx = i; break;
              }
            }
            if (headerRowIdx === -1) return;

            let holidays = [];
            const holidayRow = data[headerRowIdx + 2];
            const eventRowForHolidays = data[headerRowIdx + 1];
            const headerRowForHolidays = data[headerRowIdx];
            if (holidayRow && eventRowForHolidays && headerRowForHolidays) {
              for (let j = 4; j < headerRowForHolidays.length; j++) {
                const cellStr = headerRowForHolidays[j] || "";
                const holidayStr = holidayRow[j] || "";
                const eventStr = eventRowForHolidays[j] || "";
                const match = cellStr.match(/(\d+)\s*[/.]\s*(\d+)/);
                const isHoliday = (holidayStr.includes("공휴일") || holidayStr.includes("근로자") || holidayStr.includes("휴무") ||
                  eventStr.includes("공휴일") || eventStr.includes("근로자") || eventStr.includes("휴무")) &&
                  !(match && match[1].padStart(2, '0') === '05' && match[2].padStart(2, '0') === '12');
                if (isHoliday) {
                  if (match) {
                    const mm = String(match[1]).padStart(2, '0');
                    const dd = String(match[2]).padStart(2, '0');
                    holidays.push(`${mm}-${dd}`);
                  }
                }
              }
            }
            setHolidayDates(prev => JSON.stringify(prev) === JSON.stringify(holidays) ? prev : holidays);

            const targetStartDate = new Date(date);
            targetStartDate.setHours(0, 0, 0, 0);
            const targetEndDate = new Date(targetStartDate);
            targetEndDate.setDate(targetEndDate.getDate() + 10);

            let alerts = [];
            const eventRow = data[headerRowIdx + 1];
            const statusRow = data[headerRowIdx + 2];
            const headerRowForAlerts = data[headerRowIdx];

            if (eventRow && statusRow && headerRowForAlerts) {
              for (let j = 4; j < headerRowForAlerts.length; j++) {
                const cellStr = headerRowForAlerts[j] || "";
                const match = cellStr.match(/(\d+)\s*[/.]\s*(\d+)/);
                if (match) {
                  const d = new Date(targetStartDate.getFullYear(), parseInt(match[1]) - 1, parseInt(match[2]));
                  d.setHours(0, 0, 0, 0);

                  if (d >= targetStartDate && d < targetEndDate) {
                    const eventName = (eventRow[j] || "").trim();
                    const statusName = (statusRow[j] || "").trim();

                    const isAlertEvent = statusName.includes("공휴일") || statusName.includes("소양교육") || statusName.includes("근로자") || statusName.includes("휴무") ||
                      eventName.includes("공휴일") || eventName.includes("소양교육") || eventName.includes("근로자") || eventName.includes("휴무");
                    if (isAlertEvent) {
                      const mm = String(match[1]).padStart(2, '0');
                      const dd = String(match[2]).padStart(2, '0');
                      const dayName = ['일', '월', '화', '수', '목', '금', '토'][d.getDay()];
                      alerts.push(`${mm}/${dd}(${dayName}) ${eventName} ${statusName}`.trim());
                    }
                  }
                }
              }
            }
            if (JSON.stringify(specialAlerts) !== JSON.stringify(alerts)) {
              setSpecialAlerts(alerts);
            }

            const targetD = new Date(date);
            targetD.setHours(0, 0, 0, 0);

            // 특이 사항 (간담회/공휴일) 감지 로직
            let currentSpecialDay = null;
            const headerRowForSpecial = data[headerRowIdx];
            for (let j = 4; j < headerRowForSpecial.length; j++) {
              const cellStr = headerRowForSpecial[j] || "";
              const match = cellStr.match(/(\d+)\s*[/.]\s*(\d+)/);
              if (match) {
                const d = new Date(targetD.getFullYear(), parseInt(match[1]) - 1, parseInt(match[2]));
                d.setHours(0, 0, 0, 0);
                if (d.getTime() === targetD.getTime()) {
                  const row3 = (data[headerRowIdx + 1] && data[headerRowIdx + 1][j]) ? data[headerRowIdx + 1][j].trim() : "";
                  const row4 = (data[headerRowIdx + 2] && data[headerRowIdx + 2][j]) ? data[headerRowIdx + 2][j].trim() : "";
                  const row5 = (data[headerRowIdx + 3] && data[headerRowIdx + 3][j]) ? data[headerRowIdx + 3][j].trim() : "";
                  if (row3.includes("간담회") || row4.includes("공휴일")) {
                    currentSpecialDay = { student: row3, location: row4, memo: row5 };
                  }
                  break;
                }
              }
            }
            setSpecialDayData(currentSpecialDay);

            const realToday = new Date();
            realToday.setHours(0, 0, 0, 0);

            const validColIndices = [];
            const headerRow = data[headerRowIdx];
            for (let j = 4; j < headerRow.length; j++) {
              const cellStr = headerRow[j] || "";
              const match = cellStr.match(/(\d+)\s*[/.]\s*(\d+)/);
              if (match) {
                const d = new Date(targetD.getFullYear(), parseInt(match[1]) - 1, parseInt(match[2]));
                d.setHours(0, 0, 0, 0);
                if (d <= targetD) {
                  validColIndices.push({ index: j, colDate: d });
                }
              }
            }

            students.forEach((studentStr, idx) => {
              if (!studentStr || !studentStr.trim()) return;

              const names = studentStr.split(/[/,]/).map(s => s.trim().split('(')[0].trim()).filter(s => s.length > 0);
              let shiftCounts = [];

              names.forEach(targetName => {
                if (targetName.includes("보조강사") || targetName.includes("자체학습") || targetName.includes("대상자발굴") || targetName.includes("도선복지관")) return;

                let count = 0;
                let attendedDatesForStudent = [];

                validColIndices.forEach(colInfo => {
                  const j = colInfo.index;
                  const colDate = colInfo.colDate;
                  let foundStatuses = [];

                  for (let i = headerRowIdx + 1; i < data.length; i++) {
                    const row = data[i];
                    if (!row || row.length < 4) continue;
                    const category = row[3] ? row[3].replace(/\s+/g, '') : "";

                    if (category === "대상") {
                      const statusRow = (i + 2 < data.length) ? data[i + 2] : null;
                      const cellStudent = row[j] ? row[j].trim() : "";
                      const cellStatus = statusRow && statusRow[j] ? statusRow[j].trim() : "";

                      if (cellStudent.includes(targetName)) {
                        const finalStatus = parseStudentSpecificStatus(cellStatus, cellStudent, targetName);
                        foundStatuses.push(finalStatus);
                      }
                    }
                  }

                  let hasSessionOnThisDay = false;

                  if (foundStatuses.length > 0) {
                    const nonEmpty = foundStatuses.filter(s => s !== "");
                    const statusesToEval = nonEmpty.length > 0 ? nonEmpty : foundStatuses;

                    const hasAbsence = statusesToEval.some(s => s.includes("결석"));
                    const isCanceled = statusesToEval.some(s => s.includes("취소"));
                    const isTeacherVacation = statusesToEval.some(s => s.includes("선생님휴가"));

                    if (targetName.includes("경로당") && (hasAbsence || isCanceled)) {
                      hasSessionOnThisDay = true;
                    } else if (hasAbsence) {
                      hasSessionOnThisDay = false;
                    } else {
                      const hasNumber = statusesToEval.some(s => {
                        const parts = s.split(',').map(p => p.trim());
                        return parts.some(part => /^[1-9]\d*/.test(part));
                      });

                      if (hasNumber) {
                        hasSessionOnThisDay = true;
                      } else {
                        if (isCanceled || isTeacherVacation) {
                          hasSessionOnThisDay = false;
                        } else if (colDate < realToday) {
                          hasSessionOnThisDay = false;
                        } else {
                          hasSessionOnThisDay = true;
                        }
                      }
                    }
                  }

                  if (hasSessionOnThisDay) {
                    count++;
                    attendedDatesForStudent.push(colDate);
                  }
                });

                if (count > 0) {
                  shiftCounts.push({ name: targetName, count: count, dates: attendedDatesForStudent });
                }
              });

              newCounts[idx] = shiftCounts.length > 0 ? shiftCounts : null;
            });

            setStudentCounts(newCounts);
          }
        });
      }, [teamCsvText, date, JSON.stringify(Object.values(logs).map(l => l.student)), shifts]);

      useEffect(() => {
        if (!selectedTeam || !currentUser) { setAllScheduleData({}); return; }

        let isMounted = true;

        const cacheKey = `sungdong_schedule_${selectedTeam}_${currentUser}`;
        const cachedSchedule = window.localStorage.getItem(cacheKey);
        if (cachedSchedule) {
          try {
            setAllScheduleData(JSON.parse(cachedSchedule));

        }

        const fetchScheduleAll = async () => {
          if (isMounted) setIsSyncing(true);
          if (isMounted && !cachedSchedule) setIsFetchingSchedule(true);

            const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getScheduleAll&team=${selectedTeam}&teacher=${encodeURIComponent(currentUser)}&t=${Date.now()}`);
            if (response.ok) {
              const data = await response.json();
              if (isMounted) {

          } catch (error) { } finally {

              setIsFetchingSchedule(false);
              setIsSyncing(false);

        return () => { isMounted = false; };
      }, [selectedTeam, currentUser, refreshTrigger]);

      useEffect(() => {
        const todaysData = allScheduleData[date] || {};

        setLogs(prevLogs => {
          const newLogs = { ...prevLogs };
          shifts.forEach((shift, index) => {
            const fetchedData = todaysData[shift] || {};
            const statusStr = formatStatusIfDate(fetchedData.status) || "";

            let loadedStudent = (fetchedData.student === undefined || fetchedData.student === null) ? "" : fetchedData.student;
            let loadedLocation = (fetchedData.location === undefined || fetchedData.location === null) ? "" : fetchedData.location;

            // 특이 사항 자동 반영 (첫 번째 슬롯) - 사용자 요청으로 비활성화
            /*
            const isSpecialDay = index === 0 && specialDayData;
            if (isSpecialDay && (!loadedStudent && !loadedLocation || ["김종철", "표영", "강계환"].includes(currentUser.trim()))) {

              loadedLocation = specialDayData.location;
            }
            */

            const isShowHeadcount = loadedStudent.includes("보조강사") || loadedStudent.includes("경로당") || loadedLocation.includes("경로당");

            let loadedTags = [[]];
            let memoParts = [];

            const rawParts = statusStr.split(',').map(s => s.trim()).filter(Boolean);
            const isKyungrodang = loadedStudent.includes("경로당") || loadedLocation.includes("경로당") || loadedLocation.includes("도선복지관") || loadedStudent.includes("도선복지관");

            let tagParts = [];
            let isMemoStarted = false;
            let loadedHeadcount = "";
            let startIndex = 0;

            if (isShowHeadcount && rawParts.length > 0 && /^\d{1,2}$/.test(rawParts[0])) {
              loadedHeadcount = rawParts[0];
              startIndex = 1;
            }

            for (let i = startIndex; i < rawParts.length; i++) {
              const part = rawParts[i];
              if (!isMemoStarted) {
                const subParts = part.split('/').map(p => p.trim());
                const isAllTags = subParts.every(p => {
                  if (p === "") return true;
                  const spaceParts = p.split(/\s+/);
                  return spaceParts.every(sp => ATTENDANCE_TAGS.includes(sp));
                });

                if (isAllTags) {
                  tagParts.push(part);
                } else {
                  isMemoStarted = true;
                  memoParts.push(part);
                }
              } else {
                memoParts.push(part);
              }
            }

            /*
            if (isSpecialDay && specialDayData && specialDayData.memo && !memoParts.includes(specialDayData.memo)) {
              memoParts.push(specialDayData.memo);

            */

            if (isShowHeadcount && tagParts.length > 0 && !loadedHeadcount) {
              const lastTag = tagParts[tagParts.length - 1];
              if (/^\d{1,2}$/.test(lastTag)) {
                if (isKyungrodang || tagParts.length > 1) {
                  tagParts.pop();
                  memoParts.unshift(lastTag);
                }
              }
            }

            if (tagParts.length > 0) {
              const combinedTagStr = tagParts.join(',');
              const studentTagStrs = combinedTagStr.split('/');
              loadedTags = studentTagStrs.map(str =>
                str.split(/[,\s]+/).map(t => t.trim()).filter(t => ATTENDANCE_TAGS.includes(t))
              );
            }

            loadedTags = loadedTags.map(tags => tags.sort((a, b) => ATTENDANCE_TAGS.indexOf(a) - ATTENDANCE_TAGS.indexOf(b)));

            if (isShowHeadcount && memoParts.length > 0 && !loadedHeadcount) {
              if (/^\d{1,2}$/.test(memoParts[0].trim())) {
                loadedHeadcount = memoParts[0].trim();
                memoParts.shift();
              }
            }

            const loadedMemo = memoParts.join(', ');

            newLogs[index] = {
              student: loadedStudent,
              status: statusStr,
              location: loadedLocation,
              selectedTags: loadedTags,
              memo: loadedMemo,
              headcount: loadedHeadcount
            };
          });
          return newLogs;
        });
      }, [date, allScheduleData, selectedTeam, currentUser, shifts]);

      const buildStatusString = (log) => {
        let tagsStrings = [];
        const studentNames = (log.student || "").split(/[/,]/).map(s => s.trim()).filter(s => s.length > 0);
        const maxRows = Math.max(1, studentNames.length);

        for (let j = 0; j < maxRows; j++) {
          const tags = (log.selectedTags && log.selectedTags[j]) ? log.selectedTags[j] : [];
          const sorted = [...tags].sort((a, b) => ATTENDANCE_TAGS.indexOf(a) - ATTENDANCE_TAGS.indexOf(b));
          tagsStrings.push(sorted.length > 0 ? sorted.join(', ') : '');
        }

        let orderedTagsStr = "";
        if (tagsStrings.some(s => s.length > 0)) {
          orderedTagsStr = maxRows > 1 ? tagsStrings.join('/') : (tagsStrings[0] || "");
        }

        const isKyungrodang = (log.student || "").includes("경로당") || (log.location || "").includes("경로당") || (log.location || "").includes("도선복지관") || (log.student || "").includes("도선복지관");
        const isShowHeadcount = (log.student || "").includes("보조강사") || isKyungrodang;

        let result = [];
        if (isShowHeadcount && log.headcount) {
          result.push(log.headcount);
        }
        if (orderedTagsStr) {
          result.push(orderedTagsStr);
        }
        if (log.memo) {
          result.push(log.memo);
        }

        return result.join(', ');
      };

      const hasChanges = useMemo(() => {
        const todaysOriginalData = allScheduleData[date] || {};
        return shifts.some((shift, i) => {
          const log = logs[i];
          const original = todaysOriginalData[shift] || {};
          const originalStatus = formatStatusIfDate(original.status);
          const currentStatusStr = buildStatusString(log);

          return (log.student || "") !== (original.student || "") ||
            (log.location || "") !== (original.location || "") ||
            currentStatusStr !== originalStatus;
        });
      }, [logs, allScheduleData, date, selectedTeam, shifts]);

      const isEmptySchedule = useMemo(() => {
        return Object.values(logs).every(log => !log.student?.trim() && !log.location?.trim());
      }, [logs]);

      const isMissingHeadcount = useMemo(() => {
        return false; // 더 이상 경로당 인원수 빈값 체크를 하지 않음
      }, [logs]);

      const performAutoSave = async (forceIndex = null, signatureOverride = null) => {
        const todaysOriginalData = allScheduleData[date] || {};

        const initialProgress = shifts.map((shiftTime, i) => {
          const log = logs[i];
          const original = todaysOriginalData[shiftTime] || {};
          const originalStatus = formatStatusIfDate(original.status);
          const currentStatusStr = buildStatusString(log);

          const isChanged = (i === forceIndex) || (log.student || "") !== (original.student || "") ||
            (log.location || "") !== (original.location || "") ||
            currentStatusStr !== originalStatus;

          return {
            index: i,
            isRepeat: false,
            shift: shiftTime,
            student: log.student || "미입력",
            attendance: currentStatusStr || "입력 없음",
            isChanged: isChanged,
            status: isChanged ? '대기 중' : '변경 없음'
          };
        });

        const changedIndices = initialProgress.filter(p => p.isChanged).map(p => p.index);

        if (changedIndices.length === 0) return true;

        for (let i of changedIndices) {
          const log = logs[i];
          const studentNames = (log.student || "").split(/[/,]/).map(s => s.trim()).filter(s => s.length > 0);

          if (studentNames.length >= 2) {
            let checkedCount = 0;
            for (let sIdx = 0; sIdx < studentNames.length; sIdx++) {
              const tags = log.selectedTags[sIdx] || [];
              if (tags.length > 0) checkedCount++;
            }

            if (checkedCount > 0 && checkedCount < studentNames.length) {
              setValidationErrorMsg(`[${shifts[i]}] 시간에 출결이 선택되지 않은 학생이 있습니다.\n두 명 모두 출결 상태를 체크해 주세요.`);
              setShowValidationError(true);
              return false;
            }
          }
        }

        setSaveProgress(initialProgress);
        setIsSaveComplete(false);
        setShowSavePopup(true);
        setIsSubmitting(true);
        console.log("💾 저장 시작 - 선택된 팀:", selectedTeam, "날짜:", date);

        const fetchWithTimeout = async (url, options = {}, timeoutMs = 15000) => {
          const controller = new AbortController();
          const id = setTimeout(() => controller.abort(), timeoutMs);
          try {
            const response = await fetch(url, { ...options, signal: controller.signal });
            clearTimeout(id);
            return response;
          } catch (error) {
            clearTimeout(id);
            throw error;
          }
        };

        const savePromises = changedIndices.map(async (i, mapIndex) => {
          if (mapIndex > 0) await new Promise(res => setTimeout(res, mapIndex * 150));

          const shiftTime = shifts[i];
          const log = logs[i];
          const effectiveLocation = (i === forceIndex && signatureOverride) ? signatureOverride : (log.location || "");
          const currentStatusStr = buildStatusString(log);

          let url, fetchOptions;
          if (selectedTeam === '취업팀' && effectiveLocation && effectiveLocation.startsWith('data:image')) {
            url = GOOGLE_SCRIPT_URL;
            fetchOptions = {
              method: 'POST',
              headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
              body: `action=saveSignatureLog&team=${encodeURIComponent(selectedTeam)}&teacher=${encodeURIComponent(currentUser)}&date=${date}&shift=${encodeURIComponent(shiftTime)}&student=${encodeURIComponent(log.student || "")}&status=${encodeURIComponent(currentStatusStr)}&signatureData=${encodeURIComponent(effectiveLocation)}`
            };
          } else if (selectedTeam === '취업팀' && effectiveLocation === '__DELETE__') {
            // 싸인 삭제 요청: 빈 signatureData를 전송하여 기존 드라이브 파일 삭제 + 시트 링크 비움
            url = GOOGLE_SCRIPT_URL;
            fetchOptions = {
              method: 'POST',
              headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
              body: `action=saveSignatureLog&team=${encodeURIComponent(selectedTeam)}&teacher=${encodeURIComponent(currentUser)}&date=${date}&shift=${encodeURIComponent(shiftTime)}&student=${encodeURIComponent(log.student || "")}&status=${encodeURIComponent(currentStatusStr)}&signatureData=`
            };
          } else {
            url = `${GOOGLE_SCRIPT_URL}?action=saveLog&team=${selectedTeam}&teacher=${encodeURIComponent(currentUser)}&date=${date}&shift=${encodeURIComponent(shiftTime)}&location=${encodeURIComponent(effectiveLocation)}&student=${encodeURIComponent(log.student || "")}&status=${encodeURIComponent(currentStatusStr)}&t=${Date.now()}`;
            fetchOptions = { method: 'GET' };
          }

          let lastError = null;
          for (let attempt = 1; attempt <= 5; attempt++) {
            try {
              setSaveProgress(prev => prev.map((item, idx) => idx === i ? { ...item, status: attempt === 1 ? '저장 중...' : `재시도 중...(${attempt}/5)` } : item));

              const response = await fetchWithTimeout(url, fetchOptions, 15000);
              if (response.ok) {
                const json = await response.json();
                if (json && json.success === false) {
                  throw new Error(json.message || "시트 내부 에러");
                } else {
                  setSaveProgress(prev => prev.map((item, idx) => idx === i ? { ...item, status: '저장 완료' } : item));

                  // ★ 서버에서 반환된 URL(있을 경우)을 로컬 상태에 반영
                  const finalUrl = (json && (json.imageUrl || json.url)) ? (json.imageUrl || json.url) : log.location;
                  setLogs(prev => ({ ...prev, [i]: { ...prev[i], location: finalUrl } }));

                  return {
                    index: i, id: Date.now() + parseInt(i), team: selectedTeam, teacher: currentUser, date: date, shift: shiftTime,
                    student: log.student || "", location: finalUrl, status: currentStatusStr, submittedAt: new Date().toLocaleTimeString()
                  };
                }
              } else {
                throw new Error("⚠️ 네트워크 오류");
              }
            } catch (e) {
              lastError = e;
              if (attempt === 5) break;
              const jitter = Math.floor(Math.random() * 500);
              await new Promise(res => setTimeout(res, 1000 + jitter));
            }
          }

          console.error(`[${shiftTime}] 저장 최종 실패:`, lastError);
          setSaveProgress(prev => prev.map((item, idx) => idx === i ? { ...item, status: '저장 실패' } : item));
          return null;
        });

        const resolvedResults = await Promise.all(savePromises);
        const validRecords = resolvedResults.filter(record => record !== null);

        if (validRecords.length > 0) {
          setRecords(prev => [...validRecords.reverse(), ...prev]);
          setAllScheduleData(prev => {
            const newData = { ...prev };
            if (!newData[date]) newData[date] = {};
            validRecords.forEach(record => {
              newData[date][record.shift] = {
                ...logs[record.index],
                location: record.location, // 서버에서 받은 최종 URL 반영
                status: record.status
              };

            return newData;
          });
          // setRefreshTrigger(prev => prev + 1); // 서버 데이터 지연으로 인한 덮어쓰기 방지를 위해 주석 처리
        } else {
          setErrorMessage("⚠️ 저장에 실패한 항목이 있습니다.");
          setTimeout(() => setErrorMessage(""), 3000);
        }

        setIsSubmitting(false);
        setIsSaveComplete(true);
        return true;
      };

      const handleInputBlur = () => {
        setTimeout(() => {
          window.scrollTo({ top: window.scrollY, behavior: 'instant' });
        }, 50);
      };

      const handleLogout = () => { setIsLoggedIn(false); setRecords([]); };
      const handleSubmit = async (e) => { e.preventDefault(); await performAutoSave(); };

      const getTagClass = (index, sIdx, tag) => {
        const isActive = logs[index]?.selectedTags && logs[index].selectedTags[sIdx] && logs[index].selectedTags[sIdx].includes(tag);
        if (!isActive) {
          return 'bg-white text-gray-700 font-bold border-[1.5px] border-gray-300 shadow-[0_2px_0_#9ca3af] active:shadow-[0_0px_0_#9ca3af] active:translate-y-[2px]';
        }

        if (tag === '결석') return `bg-red-400 border-red-500 ${baseActiveStyle}`;
        if (tag === '취소') return `bg-orange-350 border-orange-500 ${baseActiveStyle}`;
        if (tag === '선생님휴가') return `bg-gray-500 border-gray-600 ${baseActiveStyle}`;
        return `bg-blue-500 border-blue-700 ${baseActiveStyle}`;
      };

      const handleRepeatSchedule = () => {
        if (isDataLoading) return;
        const currentDayOfWeek = new Date(date).getDay();
        const targetDates = availableDates.filter(d => d > date && new Date(d).getDay() === currentDayOfWeek);

        if (targetDates.length === 0) {
          setErrorMessage("⚠️ 이후 동일한 요일의 날짜가 없습니다.");
          setTimeout(() => setErrorMessage(""), 3000);
          return;
        }

        const validTargetDates = targetDates.filter(targetDate => {
          const todaysOriginalData = allScheduleData[targetDate] || {};
          let hasDifference = false;
          shifts.forEach((shiftTime, i) => {
            const log = logs[i];
            const original = todaysOriginalData[shiftTime] || {};
            if ((log.student || "") !== (original.student || "") || (log.location || "") !== (original.location || "")) {
              hasDifference = true;
            }
          });
          return hasDifference;
        });

        if (validTargetDates.length === 0) {
          setErrorMessage(<span className="text-lg">⚠️ 이미 동일한 일정이 등록되어 있습니다.</span>);
          setTimeout(() => setErrorMessage(""), 3000);
          return;
        }
        setRepeatTargetDates(validTargetDates);
        setShowRepeatConfirm(true);
      };

      const executeRepeatSchedule = async () => {
        setShowRepeatConfirm(false);
        setIsSubmitting(true);
        setShowSavePopup(true);
        setIsSaveComplete(false);

        let allTasks = [];

        repeatTargetDates.forEach((targetDate) => {
          const todaysOriginalData = allScheduleData[targetDate] || {};
          shifts.forEach((shiftTime, i) => {
            const log = logs[i];
            const original = todaysOriginalData[shiftTime] || {};
            if ((log.student || "") !== (original.student || "") || (log.location || "") !== (original.location || "")) {
              allTasks.push({
                id: `${targetDate}_${i}`,
                date: targetDate,
                shift: shiftTime,
                student: log.student || "",
                location: log.location || "",
                statusStr: "",
                index: i
              });
            }
          });
        });

        if (allTasks.length === 0) {
          setSaveProgress([]);
          setIsSubmitting(false);
          setIsSaveComplete(true);
          setShowSavePopup(false);
          return;
        }

        setSaveProgress(allTasks.map(t => {
          const mm = t.date.substring(5, 7);
          const dd = t.date.substring(8, 10);
          const dayName = getDayName(t.date);
          return {
            id: t.id,
            isRepeat: true,
            dateDisplay: `${mm}/${dd}(${dayName})`,
            timeDisplay: t.shift,
            student: t.student || "미입력",
            status: '대기 중'
          };
        }));

        const fetchWithTimeout = async (url, options = {}, timeoutMs = 15000) => {
          const controller = new AbortController();
          const id = setTimeout(() => controller.abort(), timeoutMs);
          try {
            const response = await fetch(url, { ...options, signal: controller.signal });
            clearTimeout(id);
            return response;
          } catch (error) {
            clearTimeout(id);
            throw error;
          }
        };

        const validRecords = [];
        const chunkSize = 3;

        for (let idx = 0; idx < allTasks.length; idx += chunkSize) {
          const chunkTasks = allTasks.slice(idx, idx + chunkSize);
          const chunkPromises = chunkTasks.map(async (task, chunkIdx) => {
            if (chunkIdx > 0) await new Promise(res => setTimeout(res, chunkIdx * 150));

            let url, fetchOptions;
            if (selectedTeam === '취업팀' && task.location && task.location.startsWith('data:image')) {
              url = GOOGLE_SCRIPT_URL;
              fetchOptions = {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `action=saveSignatureLog&team=${encodeURIComponent(selectedTeam)}&teacher=${encodeURIComponent(currentUser)}&date=${task.date}&shift=${encodeURIComponent(task.shift)}&student=${encodeURIComponent(task.student)}&status=${encodeURIComponent(task.statusStr)}&signatureData=${encodeURIComponent(task.location)}`
              };
            } else {
              url = `${GOOGLE_SCRIPT_URL}?action=saveLog&team=${selectedTeam}&teacher=${encodeURIComponent(currentUser)}&date=${task.date}&shift=${encodeURIComponent(task.shift)}&location=${encodeURIComponent(task.location)}&student=${encodeURIComponent(task.student)}&status=${encodeURIComponent(task.statusStr)}&t=${Date.now()}`;
              fetchOptions = { method: 'GET' };
            }

            for (let attempt = 1; attempt <= 5; attempt++) {
              try {
                setSaveProgress(prev => prev.map(item => item.id === task.id ? { ...item, status: attempt === 1 ? '저장 중...' : `재시도 중...(${attempt}/5)` } : item));
                const response = await fetchWithTimeout(url, fetchOptions, 15000);
                if (response.ok) {
                  const json = await response.json();
                  if (json && json.success === false) throw new Error(json.message || "시트 내부 에러");
                  setSaveProgress(prev => prev.map(item => item.id === task.id ? { ...item, status: '저장 완료' } : item));
                  if (json && json.url) {
                    task.location = json.url;
                  }
                  return task;
                } else throw new Error("네트워크 오류");
              } catch (e) {
                if (attempt === 5) {
                  setSaveProgress(prev => prev.map(item => item.id === task.id ? { ...item, status: '저장 실패' } : item));
                  return null;
                } else {
                  await new Promise(res => setTimeout(res, 1000 + Math.floor(Math.random() * 500)));
                }
              }
            }
            return null;
          });

          const resolvedChunk = await Promise.all(chunkPromises);
          resolvedChunk.forEach(record => { if (record !== null) validRecords.push(record); });
          if (idx + chunkSize < allTasks.length) await new Promise(res => setTimeout(res, 300));
        }

        if (validRecords.length > 0) {
          // 1. logs 상태를 먼저/동시에 업데이트하여 useEffect 지연으로 인한 옛날 데이터 노출 방지
          setLogs(prev => {
            const newLogs = { ...prev };
            // shifts 상태를 사용함
            validRecords.forEach(record => {
              if (record.date === date) {
                const sIdx = shifts.indexOf(record.shift);
                if (sIdx !== -1) {
                  newLogs[sIdx] = { ...newLogs[sIdx], location: record.location };
                }
              }
            });
            return newLogs;
          });

          // 2. 전체 데이터 및 로컬 스토리지 캐시 업데이트
          setAllScheduleData(prev => {
            const newData = { ...prev };
            validRecords.forEach(record => {
              if (!newData[record.date]) newData[record.date] = {};
              newData[record.date][record.shift] = {
                student: record.student,
                location: record.location,
                status: record.statusStr
              };
            });

            if (selectedTeam && currentUser) {
              const cacheKey = `sungdong_schedule_${selectedTeam}_${currentUser}`;
              window.localStorage.setItem(cacheKey, JSON.stringify(newData));
            }

            return newData;
          });
        }
        setIsSubmitting(false);
        setIsSaveComplete(true);
      };

      const availableDates = useMemo(() => {
        const dates = Object.keys(allScheduleData).sort();
        return dates.filter(d => !holidayDates.includes(d.substring(5)));
      }, [allScheduleData, holidayDates]);

      const noNewScheduleToRepeat = useMemo(() => {
        if (isFetchingSchedule || isSyncing || isSubmitting) return null;
        const currentDayOfWeek = new Date(date).getDay();
        const targetDates = availableDates.filter(d => d > date && new Date(d).getDay() === currentDayOfWeek);
        if (targetDates.length === 0) return "no_future_dates";

        const hasDifference = targetDates.some(targetDate => {
          const targetOriginalData = allScheduleData[targetDate] || {};
          return shifts.some((shiftTime, i) => {
            const log = logs[i];
            const original = targetOriginalData[shiftTime] || {};
            return (log.student || "") !== (original.student || "") || (log.location || "") !== (original.location || "");
          });
        });

        return !hasDifference ? "already_identical" : null;
      }, [date, availableDates, allScheduleData, logs, selectedTeam, isFetchingSchedule, isSyncing, isSubmitting]);
      const minDate = availableDates.length > 0 ? availableDates[0] : "";
      const maxDate = availableDates.length > 0 ? availableDates[availableDates.length - 1] : "";

      const isDataLoading = isFetchingSchedule || isSyncing || isSubmitting;

      useEffect(() => {
        if (availableDates.length === 0) return;

        // 오늘 날짜(또는 주말인 경우 다음 월요일)인 경우에는 데이터가 없더라도 자동으로 이동하지 않음
        const todayStr = getInitialWeekday();
        if (date === todayStr) return;

        if (!availableDates.includes(date)) {
          const futureDates = availableDates.filter(d => d > date);
          if (futureDates.length > 0) setDate(futureDates[0]);
          else {
            const pastDates = availableDates.filter(d => d < date);
            if (pastDates.length > 0) setDate(pastDates[pastDates.length - 1]);
          }
        }
      }, [availableDates, date]);

      const handlePrevDay = async () => {
        if (isDataLoading) return;
        await performAutoSave();
        const pastDates = availableDates.filter(d => d < date);
        if (pastDates.length > 0) setDate(pastDates[pastDates.length - 1]);
        else {
          setErrorMessage("⚠️ 데이터의 시작 날짜입니다. 이전 기록이 없습니다.");
          setTimeout(() => setErrorMessage(""), 3000);
        }
      };

      const handleNextDay = async () => {
        if (isDataLoading) return;
        await performAutoSave();
        const futureDates = availableDates.filter(d => d > date);
        if (futureDates.length > 0) setDate(futureDates[0]);
        else {
          setErrorMessage("⚠️ 데이터의 마지막 날짜입니다. 이후 기록이 없습니다.");
          setTimeout(() => setErrorMessage(""), 3000);
        }
      };

      const handleTodayClick = async () => {
        if (isDataLoading) return;
        await performAutoSave();
        const todayStr = getInitialWeekday();

        // 오늘 날짜로 무조건 이동 (데이터 유무 상관없이)
        setDate(todayStr);
      };

      const handleDateChange = async (e) => {
        const s = e.target.value;
        if (!s || isDataLoading) return;
        await performAutoSave();

        // 구글 시트 데이터 범위 내에 있는지 엄격하게 체크
        if (availableDates.length > 0) {
          if (s < minDate || s > maxDate || !availableDates.includes(s)) {
            let targetDate = s;
            if (s < minDate) targetDate = minDate;
            else if (s > maxDate) targetDate = maxDate;

            // 만약 선택한 날짜가 범위 내에 있지만 (예: 공휴일) availableDates에는 없는 경우
            if (!availableDates.includes(targetDate)) {
              const futureDates = availableDates.filter(d => d > targetDate);
              if (futureDates.length > 0) targetDate = futureDates[0];
              else {
                const pastDates = availableDates.filter(d => d < targetDate);
                if (pastDates.length > 0) targetDate = pastDates[pastDates.length - 1];
              }
            }

            setErrorMessage(`⚠️ 해당 날짜는 시트에 정의되지 않았습니다. (${targetDate}로 이동합니다)`);
            setTimeout(() => setErrorMessage(""), 3000);
            setDate(targetDate);
            return;
          }
        }

        const d = new Date(s);
        if (d.getDay() === 0 || d.getDay() === 6) { setErrorMessage("⚠️ 주말(토, 일요일)은 선택할 수 없습니다."); setTimeout(() => setErrorMessage(""), 3000); return; }
        setErrorMessage(""); setDate(s);
      };

      const handleLogChange = (index, field, value) => {
        setLogs(prev => ({ ...prev, [index]: { ...prev[index], [field]: value } }));
      };

      const toggleTag = (index, sIdx, tag) => {
        const now = Date.now();
        const lastClick = lastTagClickRef.current;
        if (lastClick.index === index && lastClick.sIdx === sIdx && lastClick.tag === tag && now - lastClick.time < 400) return;

        lastTagClickRef.current = { time: now, index, sIdx, tag };

        setLogs(prev => {
          const newLogs = { ...prev };
          const log = newLogs[index];
          const studentNames = (log.student || "").split(/[/,]/).map(s => s.trim()).filter(s => s.length > 0);
          const maxRows = Math.max(1, studentNames.length);
          let currentTagsArray = [...(log.selectedTags || [])];
          while (currentTagsArray.length < maxRows) currentTagsArray.push([]);

          const exclusiveTags = ['1', '2', '결석'];

          if (tag === '선생님휴가') {
            const isAnySelected = currentTagsArray.some(tags => tags.includes('선생님휴가'));
            if (isAnySelected) {
              currentTagsArray = currentTagsArray.map(tags => tags.filter(t => t !== '선생님휴가'));
            } else {
              currentTagsArray = currentTagsArray.map(tags => {
                let newTags = [...tags];
                if (!newTags.includes('선생님휴가')) newTags.push('선생님휴가');
                return newTags;
              });
            }
          } else {
            let newTags = [...(currentTagsArray[sIdx] || [])];
            if (newTags.includes(tag)) {
              newTags = newTags.filter(t => t !== tag);
            } else {
              if (exclusiveTags.includes(tag)) newTags = newTags.filter(t => !exclusiveTags.includes(t));
              newTags.push(tag);
            }
            currentTagsArray[sIdx] = newTags;
          }

          newLogs[index].selectedTags = currentTagsArray;
          return newLogs;
        });
      };

      const handleLogin = (e) => {
        if (e) e.preventDefault();
        if (!isLoginReady) return;

        if (currentUser) {
          // 데이터 유무와 상관없이 항상 오늘(또는 대체 월요일) 날짜를 우선으로 설정
          const todayStr = getInitialWeekday();
          setDate(todayStr);
          setIsLoggedIn(true);
          setRefreshTrigger(prev => prev + 1);
        }
      };

      const handleMainTouchStart = (e) => {
        mainTouchStartX.current = e.touches[0].clientX;
        mainTouchStartY.current = e.touches[0].clientY;
        setPullDistance(0);
      };

      const handleMainTouchMove = (e) => {
        if (mainTouchStartX.current === null || mainTouchStartY.current === null) return;
        const touchEndX = e.touches[0].clientX;
        const touchEndY = e.touches[0].clientY;
        const deltaX = touchEndX - mainTouchStartX.current;
        const deltaY = touchEndY - mainTouchStartY.current;

        if (deltaY > 0 && deltaY > Math.abs(deltaX) * 2) setPullDistance(Math.min(deltaY, 400));
        else setPullDistance(0);
      };

      const handleMainTouchEnd = (e) => {
        if (mainTouchStartX.current === null || mainTouchStartY.current === null) return;
        const touchEndX = e.changedTouches[0].clientX;
        const touchEndY = e.changedTouches[0].clientY;
        const deltaX = touchEndX - mainTouchStartX.current;
        const deltaY = touchEndY - mainTouchStartY.current;

        if (deltaY > 300 && deltaY > Math.abs(deltaX) * 2) window.location.reload();
        else setPullDistance(0);
        mainTouchStartX.current = null;
        mainTouchStartY.current = null;
      };

      const handleTouchStart = (e) => {
        touchStartX.current = e.touches[0].clientX;
        touchStartY.current = e.touches[0].clientY;
      };

      const handleTouchEnd = (e) => {
        if (touchStartX.current === null || touchStartY.current === null) return;
        const touchEndX = e.changedTouches[0].clientX;
        const touchEndY = e.changedTouches[0].clientY;
        const deltaX = touchStartX.current - touchEndX;
        const deltaY = touchStartY.current - touchEndY;

        if (isDataLoading) { touchStartX.current = null; touchStartY.current = null; return; }

        if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 250) {

        touchStartY.current = null;

              </div>

              style={{
                transform: `translateY(${pullDistance * 0.1}px)`,
                transition: pullDistance === 0 ? 'transform 0.3s ease-out' : 'none'
              }}
            >
              <div className="text-center mb-5 sm:mb-8 shrink-0 mt-2 sm:mt-0">
                <div className="flex justify-center mb-2 sm:mb-4">
                  <img src="Logo_of_Seoul.jpg" alt="서울시 로고" className="h-8 sm:h-10 object-contain" onError={(e) => e.target.style.display = 'none'} />
                </div>
                <div className="flex items-center justify-center mb-1 sm:mb-2">
                  <h1 className="text-2xl sm:text-4xl font-black text-blue-600">성동노인종합복지관</h1>
                </div>
                <h2 className="text-[clamp(14px,4.5vw,18px)] sm:text-2xl font-bold text-red-600 whitespace-nowrap tracking-tighter">디지털교육서포터즈 업무일지 시스템</h2>
              </div>

              <div className="flex flex-col gap-3 sm:gap-4 shrink-0">
                <div>
                  <label className="block text-gray-700 font-semibold mb-1 sm:mb-2 text-lg sm:text-xl">1. 팀 선택</label>
                  <select className="w-full h-[48px] sm:h-[56px] px-3 sm:px-4 border border-sky-300 rounded-xl text-xl sm:text-2xl bg-sky-100 text-blue-700 outline-none font-bold shadow-md focus:ring-2 focus:ring-blue-400" value={selectedTeam} onChange={(e) => {
                    setSelectedTeam(e.target.value);
                    setCurrentUser("");
                  }}>
                    <option value="">팀을 선택하세요</option>
                    {teamList.map(team => <option key={team} value={team}>{team}</option>)}
                  </select>
                </div>
                {selectedTeam && (
                  <div>
                    <label className="block text-gray-700 font-semibold mb-1 sm:mb-2 text-lg sm:text-xl flex justify-between items-end">
                      <span>2. 선생님 선택</span>
                      {isFetchingTeachers && <span className="text-base sm:text-lg text-red-600 font-bold flex items-center mb-1 animate-pulse"><Clock className="w-4 h-4 sm:w-5 sm:h-5 mr-1 animate-spin" />로딩 중...</span>}
                    </label>
                    <div className="flex gap-2">
                      <select className="flex-1 h-[48px] sm:h-[56px] px-3 sm:px-4 border border-sky-300 rounded-xl text-xl sm:text-2xl bg-sky-100 text-blue-700 outline-none font-bold shadow-md focus:ring-2 focus:ring-blue-400" value={currentUser} onChange={(e) => setCurrentUser(e.target.value)} disabled={isFetchingTeachers}>
                        <option value="">선생님을 선택하세요</option>
                        {teachers.map(name => <option key={name} value={name}>{name.replace(/\n/g, ' ')}</option>)}
                      </select>

                      <AnimatedRefreshButton
                        onClick={() => fetchTeachersFromSheet(selectedTeam)}
                        isFetching={isFetchingTeachers}

                    </div>
                  </div>
                )}

                <div className="pt-1 sm:pt-2 flex">
                  {!isLoginReady ? (
                    <div className="flex-1 flex items-center justify-center w-full rounded-xl text-[clamp(17px,4.5vw,24px)] lg:text-[20px] tracking-tight font-extrabold text-white bg-gray-400 border-2 border-gray-400 cursor-not-allowed shadow-md opacity-90 select-none min-h-[54px]">
                      {isFetchingSchedule ? <><Clock className="w-6 h-6 sm:w-8 sm:h-8 lg:w-7 lg:h-7 mr-2 animate-spin" /> 데이터 확인 중...</> : <><EditIcon className="w-6 h-6 sm:w-8 sm:h-8 lg:w-7 lg:h-7 mr-2" /> 일지 작성 시작하기</>}
                    </div>
                  ) : (
                    <button onClick={handleLogin} className="flex-1 flex items-center justify-center w-full rounded-xl text-[clamp(17px,4.5vw,24px)] lg:text-[20px] tracking-tight font-extrabold text-white bg-blue-600 border-2 border-blue-600 hover:bg-blue-700 active:scale-95 transition-all shadow-md touch-manipulation min-h-[54px]">
                      <EditIcon className="w-6 h-6 sm:w-8 sm:h-8 lg:w-7 lg:h-7 mr-2" /> 일지 작성 시작하기
                    </button>
                  )}
                </div>
              </div>

              <div className="py-3 sm:py-4 flex justify-center items-center shrink-0 mt-1">
                <VintageDivider className="w-4/5 h-6 sm:h-8 text-gray-500 opacity-60" />
              </div>

              <div className="flex-1 flex flex-col gap-4 sm:gap-6 min-h-[180px]">
                {/* 💡 [추가] 나의 주간 일정 보기 버튼 */}
                <button
                  onClick={() => {
                    if (!selectedTeam || !currentUser) {
                      setErrorMessage("팀과 선생님을 먼저 선택해주세요.");
                      setTimeout(() => setErrorMessage(""), 3000);
                      return;

                    onNavigateToMyWeeklySchedule();

                  className={`flex-1 flex items-center justify-center w-full rounded-xl text-[clamp(17px,4.5vw,24px)] lg:text-[20px] tracking-tight font-black shadow-md transition-all active:scale-95 touch-manipulation min-h-[54px] ${(!selectedTeam || !currentUser) ? 'text-gray-400 bg-gray-100 border-2 border-gray-200 cursor-not-allowed' : 'text-blue-900 bg-[#a9d0fd] border-2 border-blue-400 hover:bg-blue-300'}`}
                >
                  <CalendarIcon className="w-6 h-6 sm:w-8 sm:h-8 lg:w-7 lg:h-7 mr-1.5 sm:mr-2" /> 나의 주간 일정 보기
                </button>

                {selectedTeam ? (
                  <>
                    <button onClick={() => onNavigateToDailySchedule(selectedTeam)} className="flex-1 flex items-center justify-center w-full rounded-xl text-[clamp(17px,4.5vw,24px)] lg:text-[20px] tracking-tight font-extrabold shadow-md text-blue-900 bg-orange-100 border-2 border-orange-300 hover:bg-orange-200 transition-all active:scale-95 touch-manipulation min-h-[54px]">
                      <CalendarClockIcon className="w-6 h-6 sm:w-8 sm:h-8 lg:w-7 lg:h-7 mr-1.5 sm:mr-2" /> 팀 별 오늘 일정 보기
                    </button>
                    <a href={getNoCacheUrl(SHEET_URLS[selectedTeam])} target="_blank" rel="noopener noreferrer" className="flex-1 flex items-center justify-center w-full rounded-xl text-[clamp(17px,4.5vw,24px)] lg:text-[20px] tracking-tight font-extrabold shadow-md text-blue-900 bg-orange-100 border-2 border-orange-300 hover:bg-orange-200 transition-all active:scale-95 min-h-[54px]">
                      <CalendarDaysIcon className="w-6 h-6 sm:w-8 sm:h-8 lg:w-7 lg:h-7 mr-1.5 sm:mr-2" /> 팀 별 전체 일정 보기
                    </a>

                ) : (
                  <>

                      <CalendarClockIcon className="w-6 h-6 sm:w-8 sm:h-8 lg:w-7 lg:h-7 mr-1.5 sm:mr-2" /> 팀 별 오늘 일정 보기
                    </button>
                    <button disabled className="flex-1 flex items-center justify-center w-full rounded-xl text-[clamp(17px,4.5vw,24px)] lg:text-[20px] tracking-tight font-extrabold shadow-md text-gray-400 bg-gray-100 border-2 border-gray-200 cursor-not-allowed min-h-[54px]">

                  <UsersIcon className="w-5 h-5 sm:w-8 sm:h-8 lg:w-7 lg:h-7 mr-1 sm:mr-2 shrink-0" /> 수업 희망자 및 기타 참여자 관리
                </a>
                <button onClick={onNavigateToStudentSearch} className="flex-1 flex items-center justify-center w-full rounded-xl text-[clamp(15px,4.5vw,24px)] lg:text-[19px] tracking-tighter whitespace-nowrap px-2 font-extrabold text-blue-900 bg-teal-50 border-2 border-teal-200 hover:bg-teal-100 shadow-md touch-manipulation transition-all active:scale-95 min-h-[54px]">
                  <svg className="w-5 h-5 sm:w-8 sm:h-8 lg:w-7 lg:h-7 mr-1 sm:mr-2 shrink-0" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8" /><line x1="21" x2="16.65" y1="21" y2="16.65" /><path d="M11 8a3 3 0 0 0-3 3" /></svg> 대상자 검색하기
                </button>

                v260508
              </div>
            </div>

      return (
        <div className="min-h-[100dvh] bg-transparent font-sans pb-6">
          <header className="bg-blue-600 text-white px-4 pb-4 pt-safe-4 shadow-lg z-40 flex justify-between items-center relative">
            <div className="flex items-center">
              <div className="flex flex-col">
                <div className="flex items-center mb-1">
                  <img src="Logo_of_Seoul.jpg" alt="서울시 로고" className="h-7 bg-white px-2 py-1 rounded-md object-contain mr-2" onError={(e) => e.target.style.display = 'none'} />
                  <h1 className="font-black text-xl leading-tight">성동노인종합복지관</h1>
                </div>
                <p className="text-base font-bold text-yellow-300">디지털교육 서포터즈</p>
                <p className="text-base opacity-95 flex items-center mt-1 font-bold">
                  <User className="w-4 h-4 mr-1" /> [{selectedTeam}] {currentUser.replace(/\n/g, ' ')} 선생님
                </p>
              </div>
            </div>

            <button
              onClick={(e) => {

        else if (day === 6) d.setDate(d.getDate() + 2);

        const diff = d.getDate() - newDay + (newDay === 0 ? -6 : 1);
        return new Date(d.setDate(diff));
      });

        const d = new Date();

        if (day === 0) d.setDate(d.getDate() + 1);

          document.body.style.overscrollBehaviorY = 'auto';

      useEffect(() => {
        if (showPwdModal && pwdInputRef.current) {
          pwdInputRef.current.focus();
        }
      }, [showPwdModal]);

      useEffect(() => {
        isManagerModeRef.current = isManagerMode;
      }, [isManagerMode]);

      const handleTouchStart = (e) => {
        touchStartX.current = e.touches[0].clientX;
        touchStartY.current = e.touches[0].clientY;
      };

      const handleTouchEnd = (e) => {
        if (touchStartX.current === null || touchStartY.current === null) return;
        const touchEndX = e.changedTouches[0].clientX;
        const touchEndY = e.changedTouches[0].clientY;
        const deltaX = touchStartX.current - touchEndX;
        const deltaY = touchStartY.current - touchEndY;

        if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 150) {
          if (deltaX > 0) changeWeek(1);
          else changeWeek(-1);
        }
        touchStartX.current = null;
        touchStartY.current = null;
      };

      const timeSlots = [
        "09:30 - 10:30", "10:30 - 11:30", "11:30 - 12:30",
        "13:00 - 14:00", "14:00 - 15:00", "15:00 - 16:00"
      ];
      const weekDays = ['월', '화', '수', '목', '금'];

      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
              await signInWithCustomToken(auth, window.__initial_auth_token);
            } else { await signInAnonymously(auth); }
          } catch (error) { console.error("⚠️ 인증 에러:", error); }
        };
        if (auth) {
          initAuth();
          const unsubscribe = onAuthStateChanged(auth, setUser);
          return () => unsubscribe();
        }
      }, [auth]);

      useEffect(() => {
        if (!window.FirebaseAPI || !window.FirebaseAPI.db) return;
        const { db, doc, onSnapshot } = window.FirebaseAPI;

        const unsubscribe = onSnapshot(docRef, (docSnap) => {
          if (docSnap.exists()) {
            const fbData = docSnap.data();
            if (!isManagerModeRef.current) {
              setSchedule(fbData.data || {});
              window.localStorage.setItem('classroom_schedule_backup', JSON.stringify(fbData.data || {}));

              if (!isTypingRef.current) {
                setMemo((prevMemo) => {
                  const newMemo = fbData.memo || "";
                  if (prevMemo !== newMemo) {
                    window.localStorage.setItem('classroom_memo_backup', newMemo);
                    return newMemo;
                  }
                  return prevMemo;

      const saveBulkChanges = (changes) => {
        if (Object.keys(changes).length === 0) return;
        const optimisticData = {};
        Object.keys(changes).forEach(k => {
          const cleanKey = k.replace('data.', '');
          optimisticData[cleanKey] = changes[k];
        });
        const newSchedule = { ...schedule, ...optimisticData };
        setSchedule(newSchedule);
        window.localStorage.setItem('classroom_schedule_backup', JSON.stringify(newSchedule));
      };

      const getScheduleKey = (dateStr, timeSlot) => {
        return `${dateStr}_${timeSlot.replace(/\s+/g, '').replace(/~/g, '-').replace(/:/g, '')}`;
      };

      const toggleAvailability = (dateStr, timeSlot) => {
        if (!isManagerMode) return;
        const key = getScheduleKey(dateStr, timeSlot);
        const currentValue = schedule[key];

        let newValue;
        if (!currentValue) {
          newValue = true;
        } else if (currentValue === true) {
          newValue = 'nangman';
        } else if (currentValue === 'nangman') {
          newValue = 'pending';
        } else {
          newValue = false;

        const newSchedule = { ...schedule, [key]: newValue };
        setSchedule(newSchedule);
        window.localStorage.setItem('classroom_schedule_backup', JSON.stringify(newSchedule));

        const currentDays = getCurrentWeekDays();

        currentDays.forEach(day => {

        else if (allNangman) newValue = 'pending';
        else if (allPending) newValue = false;
        else newValue = true;

        const changes = {};
        allKeys.forEach(k => { changes[`data.${k}`] = newValue; });
