    }

    // =====================================================================
    // ✨ 교육 요약 & 인사이트 컴포넌트
    // =====================================================================
    function SummarySection({ data, date, team, onTouchStart, onTouchEnd }) {
      const contents = useMemo(() => {
        if (!data || data.length === 0) return [];
        return data
          .filter(row => row.status && row.status.length > 2 && !/^\d+$/.test(row.status) && !row.status.includes("복지관으로 이동"))
          .map(row => ({
            teacher: row.teacher,
            content: row.status,
            student: row.student
          }));
      }, [data]);

      const themes = [
        { name: 'AI & 스마트 도구', keywords: ['Gemini', 'AI', 'GPT', '제미나이', '구글렌즈', '클로바', '챗지피티', '인공지능', '이미지', '파파고', '번역', '음성인식', '스마트렌즈', '빅스비', '시리', '챗봇'], icon: '✨', color: 'bg-indigo-50 text-indigo-700 border-indigo-100', baseInsight: '최신 AI 도구 활용이 두드러졌습니다. 단순 검색을 넘어 이미지 생성 및 문제 해결 단계로 교육이 고도화되고 있습니다.' },
        { name: '기기 & 보안 설정', keywords: ['와이파이', '블루투스', '화면', '소리', '벨소리', '알림', '글자', '업데이트', '비밀번호', '잠금', '보안', '용량', '배터리', '설정', '스미싱', '보이스피싱', '스팸', '바이러스', '백신'], icon: '⚙️', color: 'bg-gray-50 text-gray-700 border-gray-200', baseInsight: '스마트폰 기본 설정 및 보안 교육이 진행되어, 어르신들의 안전하고 편리한 스마트폰 사용 환경이 마련되었습니다.' },
        { name: '교통 & 이동', keywords: ['지도', '카카오T', '카카오티', '택시', '코레일', '따릉이', 'SRT', '고속버스', '길찾기', '내비게이션', '지하철', '버스', '노선', '승차권', '티켓', '기차', '예매'], icon: '🚲', color: 'bg-green-50 text-green-700 border-green-100', baseInsight: '교통 앱 활용 교육을 통해 어르신들의 이동 편의성과 자립적인 외출 능력이 크게 향상되었습니다.' },
        { name: '금융 & 결제', keywords: ['페이', '이체', '은행', '지로', '보험', '증권', '토스', '카드', '서울페이', '제로페이', '카카오페이', '삼성페이', '네이버페이', '계좌', '송금', '환전'], icon: '💰', color: 'bg-yellow-50 text-yellow-700 border-yellow-100', baseInsight: '모바일 금융 및 간편 결제 교육이 진행되었습니다. 안전한 디지털 금융 활용을 위한 보안 주의사항도 함께 강조되었습니다.' },
        { name: '소셜 & 커뮤니케이션', keywords: ['카카오톡', '카톡', '메시지', '문자', '이메일', '페이스톡', '밴드', '인스타그램', '페이스북', '유선', '연락처', '전화', '단톡방', '오픈채팅'], icon: '💬', color: 'bg-blue-50 text-blue-700 border-blue-100', baseInsight: '다양한 메신저와 SNS 활용법이 중점적으로 다루어져 어르신들의 온라인 소통 창구가 넓어졌습니다.' },
        { name: '미디어 & 콘텐츠', keywords: ['유튜브', '유트브', '사진', '영상', '편집', '갤러리', '숏츠', '릴스', '틱톡', '키네마스터', 'VITA', '캡처', '촬영', '음악', '멜론', '라디오', '팟캐스트'], icon: '🎥', color: 'bg-red-50 text-red-700 border-red-100', baseInsight: '사진/영상 촬영 및 편집 교육을 통해 디지털 콘텐츠 창작에 대한 높은 흥미와 성취감을 보였습니다.' },
        { name: '쇼핑 & 배달', keywords: ['배민', '배달의민족', '요기요', '쿠팡', '당근', '당근마켓', '중고나라', '쇼핑', '마트', '장보기', '이마트', '홈플러스', 'G마켓', '11번가', '주문', '키오스크', '무인'], icon: '🛒', color: 'bg-orange-50 text-orange-700 border-orange-100', baseInsight: '비대면 쇼핑, 배달 앱 및 키오스크 활용 교육이 이루어져 일상생활의 디지털 자립도가 높아졌습니다.' },
        { name: '공공행정 & 의료', keywords: ['정부24', '홈택스', '주민등록', '증명서', '민원', '국세청', '보조금', '복지로', 'PASS', '패스', '모바일신분증', '병원', '약국', '건강', '만보기', '혈압', '진료', '똑닥', '예방'], icon: '🏥', color: 'bg-teal-50 text-teal-700 border-teal-100', baseInsight: '공공 서비스 앱과 의료/건강 관리 앱 교육이 진행되어, 생활에 필수적인 디지털 행정 및 건강 관리 역량이 강화되었습니다.' }
      ];

      const categorized = useMemo(() => {
        return themes.map(theme => {
          const matched = contents.filter(c => theme.keywords.some(k => c.content.toLowerCase().includes(k.toLowerCase())));
          return { ...theme, items: matched };
        }).filter(t => t.items.length > 0);
      }, [contents]);

      const uncategorized = useMemo(() => {
        return contents.filter(c => !themes.some(theme => theme.keywords.some(k => c.content.toLowerCase().includes(k.toLowerCase()))));
      }, [contents]);

      const attendanceStats = useMemo(() => {
        if (!data || data.length === 0) return null;
        let total = 0, attended = 0, absent = 0, canceled = 0;
        const absentReasons = [];

        data.forEach(row => {
          const studentStr = (row.student || "").trim();
          if (!studentStr || studentStr.includes("자체학습") || studentStr.includes("대상자발굴")) return;

          const statusStr = (row.status || "").trim();
          if (statusStr.includes("복지관으로 이동") || statusStr.includes("선생님휴가")) return;

          const studentNames = studentStr.split(/[/,]/).map(s => s.trim()).filter(Boolean);
          const statusParts = statusStr.includes('/') ? statusStr.split('/') : [statusStr];

          const isShowHeadcount = (studentStr.includes("보조강사") || studentStr.includes("경로당")) && studentNames.length < 2;

          studentNames.forEach((name, idx) => {
            const isAssistant = name.includes("보조강사");
            if (isAssistant && !statusStr) return;

            let studentStatus = (statusParts.length > idx) ? statusParts[idx].trim() : statusParts[0].trim();

            let headcount = 1;
            if (isShowHeadcount) {
              const hcMatch = studentStatus.match(/^(\d+)/);
              if (hcMatch) {
                headcount = parseInt(hcMatch[1], 10);
              }
            }

            total += headcount;

            if (studentStatus.includes("결석")) {
              absent += headcount;
              if (studentStatus.includes("병원") || studentStatus.includes("진료")) absentReasons.push("병원 진료");
              else if (studentStatus.includes("행사") || studentStatus.includes("일정") || studentStatus.includes("집안")) absentReasons.push("개인 일정");
              else if (studentStatus.includes("여행")) absentReasons.push("여행");
            } else if (studentStatus.includes("취소") || studentStatus.includes("중단")) {
              canceled += headcount;
            } else if (studentStatus) {
              const isAttended = isAssistant || /^[1-9]\d*/.test(studentStatus) || studentStatus.length > 2 || studentStatus === "1" || studentStatus === "출석";
              if (isAttended) attended += headcount;
            }
          });
        });

        const rate = total > 0 ? Math.round((attended / total) * 100) : 0;
        return { total, attended, absent, canceled, rate, absentReasons: [...new Set(absentReasons)] };
      }, [data]);

      const dynamicInsights = useMemo(() => {
        const insights = [];

        if (attendanceStats) {
          if (attendanceStats.rate >= 90) {
            insights.push(`오늘 **${team}**은 **${attendanceStats.rate}%**의 높은 참여율을 기록하며 교육 열기가 매우 높았습니다.`);
          } else if (attendanceStats.rate < 70 && attendanceStats.absent > 0) {
            const reasons = attendanceStats.absentReasons.length > 0 ? attendanceStats.absentReasons.join(', ') : '개인 일정';
            insights.push(`오늘은 **${reasons}** 등의 사유로 결석이 다소 발생했으나, 출석하신 어르신들은 밀도 높은 1:1 맞춤형 수업을 진행했습니다.`);
          }
        }

        const sorted = [...categorized].sort((a, b) => b.items.length - a.items.length);
        if (sorted.length > 0) {
          const top = sorted[0];
          const foundKeywords = [];
          top.items.forEach(item => {
            top.keywords.forEach(kw => {
              if (item.content.toLowerCase().includes(kw.toLowerCase()) && !foundKeywords.includes(kw)) {
                foundKeywords.push(kw);
              }
            });
          });

          let themeText = `**[${top.name}]** 분야가 오늘 교육의 핵심이었습니다. `;
          if (foundKeywords.length > 0) {
            themeText += `특히 **${foundKeywords.slice(0, 3).join(', ')}** 등에 대한 실질적인 활용법 교육이 활발히 이루어졌습니다. `;
          }
          themeText += top.baseInsight;
          insights.push(themeText);
        }

        if (sorted.length >= 2) {
          const name1 = sorted[0].name;
          const name2 = sorted[1].name;
          const getParticle = (name) => {
            if (name.includes('설정') || name.includes('이동') || name.includes('커뮤니케이션') || name.includes('배달')) return '과';
            return '와';
          };
          const particle = getParticle(name1);
          insights.push(`**${name1}**${particle} **${name2}** 등 여러 영역을 넘나드는 복합적인 디지털 교육이 진행되어 어르신들의 종합적인 활용 능력이 강화되었습니다.`);
        }

        const allContent = contents.map(c => c.content).join(' ');
        if (allContent.includes('키오스크') && (allContent.includes('페이') || allContent.includes('이체'))) {
          insights.push(`실생활 결제와 직결되는 **키오스크 및 금융 앱** 연계 교육이 진행되어 어르신들의 독립적인 일상생활 수행 능력이 크게 향상될 것으로 기대됩니다.`);
        }
        if (allContent.includes('Gemini') || allContent.includes('제미나이') || allContent.includes('AI')) {
          insights.push(`**생성형 AI(Gemini 등)**를 활용한 최첨단 교육이 시도되어, 어르신들이 최신 디지털 트렌드에 발맞추어 나가는 모습이 인상적입니다.`);
        }

        if (attendanceStats && attendanceStats.attended === 0) {
          return ["입력된 학습 관련 데이터가 없습니다."];
        }

    function DailyScheduleApp({ initialTeam, onNavigateBack, onTeamChange }) {
      const [selectedTeam, setSelectedTeam] = useState(initialTeam || "1팀");

      const [currentDisplayDate, setCurrentDisplayDate] = useState(() => {

        d.setHours(0, 0, 0, 0);
        if (d.getDay() === 6) d.setDate(d.getDate() + 2);
        else if (d.getDay() === 0) d.setDate(d.getDate() + 1);

      });

      useEffect(() => {
        try {
          window.sessionStorage.setItem('sungdong_daily_schedule_date', currentDisplayDate.getTime().toString());
        } catch (e) { }
      }, [currentDisplayDate]);

      const [scheduleData, setScheduleData] = useState([]);
      const [isLoading, setIsLoading] = useState(false);
      const [notice, setNotice] = useState("");
      const [minDate, setMinDate] = useState(null);
      const [maxDate, setMaxDate] = useState(null);
      const [availableDates, setAvailableDates] = useState([]);

      const [globalCsvText, setGlobalCsvText] = useState("");
      const [isInitialLoad, setIsInitialLoad] = useState(true);

      const [selectedStudentDates, setSelectedStudentDates] = useState(null);
      const [expandedSigns, setExpandedSigns] = useState({}); // 싸인 토글 상태용 추가
      const shifts = ["9:30~10:30", "10:30~11:30", "11:30~12:30", "13:00~14:00", "14:00~15:00", "15:00~16:00"];

      const touchStartX = useRef(null);
      const touchStartY = useRef(null);

      const ATTENDANCE_TAGS = ['1', '결석', '취소', '선생님휴가'];

      useEffect(() => {
        document.documentElement.style.overscrollBehaviorY = 'auto';
        document.body.style.overscrollBehaviorY = 'auto';
      }, []);

      const handleTouchStart = (e) => {
        touchStartX.current = e.touches[0].clientX;
        touchStartY.current = e.touches[0].clientY;
      };

      const handleTouchEnd = (e) => {
        if (touchStartX.current === null || touchStartY.current === null) return;

        const touchEndX = e.changedTouches[0].clientX;
        const touchEndY = e.changedTouches[0].clientY;
        const deltaX = touchStartX.current - touchEndX;
        const deltaY = touchStartY.current - touchEndY;

        if (isLoading) {
          touchStartX.current = null;
          touchStartY.current = null;
          return;
        }

        if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 150) {
          if (deltaX > 0) handleDateChange(1);
          else handleDateChange(-1);
        }

        touchStartX.current = null;
        touchStartY.current = null;
      };

      const [rawData, setRawData] = useState({ csv: "", sign: {} });

      const fetchTeamData = useCallback(async (teamName, displayDate) => {
        if (!teamName) return;
        setIsLoading(true);
        setScheduleData([]);
        setRawData({ csv: "", sign: {} });

        try {
          const baseUrl = SHEET_URLS[teamName] || SHEET_URLS["1팀"];
          const exportUrl = baseUrl.replace(/\/edit.*gid=(\d+).*/, '/export?format=csv&gid=$1');

          const csvRes = await fetch(`${exportUrl}&t=${Date.now()}`);
          const csvText = await csvRes.text();

          // 취업팀 싸인 데이터는 CSV 파싱 과정에서 currentLocation(장소/싸인 행)을 통해 이미 수집됨

          setRawData({ csv: csvText, sign: {} });
        } catch (error) {
          console.error("데이터 로드 에러:", error);
          setNotice("⚠️ 데이터를 가져오지 못했습니다.");
          setIsLoading(false);
        }
      }, []);

      useEffect(() => {
        fetchTeamData(selectedTeam, currentDisplayDate);
      }, [selectedTeam, currentDisplayDate, fetchTeamData]);

      useEffect(() => {
        if (!rawData.csv || !window.Papa) return;

        window.Papa.parse(rawData.csv, {
          header: false,
          skipEmptyLines: true,
          complete: function (results) {
            try {
              const data = results.data;

              if (data.length > 0 && data[0].length > 0 && typeof data[0][0] === 'string' && data[0][0].toLowerCase().includes("<html")) {
                alert(`⚠️ [${selectedTeam}] 구글 시트 권한이 닫혀있어요! 시트 우측 상단의 [공유] 설정을 확인해주세요.`);
                setIsLoading(false);
                setIsInitialLoad(false);
                return;
              }

              let headerRowIndex = -1;
              let dateColumnIndex = -1;
              let parsedAvailableDates = [];

              for (let i = 0; i < Math.min(10, data.length); i++) {
                if (data[i] && data[i].length > 3 && data[i][3].replace(/\s+/g, '') === "구분") {
                  headerRowIndex = i;
                  const headerRow = data[i];
                  const holidayRow = data[i + 2];
                  let firstDateStr = "";
                  let lastDateStr = "";

                  for (let j = 4; j < headerRow.length; j++) {
                    if (headerRow[j] && headerRow[j].trim() !== "") {
                      let isHoliday = false;
                      const dateMatch = headerRow[j].match(/(\d+)\s*[/.]\s*(\d+)/);
                      const is0512 = dateMatch && dateMatch[1].padStart(2, '0') === '05' && dateMatch[2].padStart(2, '0') === '12';
                      if (holidayRow && holidayRow[j] && holidayRow[j].includes("공휴일") && !is0512) {
                        isHoliday = true;
                      }

                      if (!isHoliday) {
                        if (!firstDateStr) firstDateStr = headerRow[j].trim();
                        lastDateStr = headerRow[j].trim();

                        const match = headerRow[j].match(/(\d+)\s*[/.]\s*(\d+)/);
                        if (match) {
                          const d = new Date();
                          d.setMonth(parseInt(match[1]) - 1);
                          d.setDate(parseInt(match[2]));
                          d.setHours(0, 0, 0, 0);
                          parsedAvailableDates.push(d);
                        }
                      }
                    }
                  }

                  parsedAvailableDates.sort((a, b) => a.getTime() - b.getTime());
                  setAvailableDates(parsedAvailableDates);

                  const parseSheetDateStr = (str) => {
                    if (!str) return null;
                    const match = str.match(/(\d+)\/(\d+)/);
                    if (match) {
                      const d = new Date();
                      d.setMonth(parseInt(match[1]) - 1);
                      d.setDate(parseInt(match[2]));
                      d.setHours(0, 0, 0, 0);
                      return d;
                    }
                    return null;
                  };
                  setMinDate(parseSheetDateStr(firstDateStr));
                  setMaxDate(parseSheetDateStr(lastDateStr));
                  break;
                }
              }

              if (headerRowIndex === -1) {
                setScheduleData([]);
                setNotice("⚠️ 시트 양식이 맞지 않습니다.");
                setIsLoading(false);
                setIsInitialLoad(false);
                return;
              }

              const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
              const day = dayNames[currentDisplayDate.getDay()];
              let targetSearchDateStr = `${currentDisplayDate.getMonth() + 1}/${currentDisplayDate.getDate()}(${day})`;

              const targetM = currentDisplayDate.getMonth() + 1;
              const targetD = currentDisplayDate.getDate();

              let isHolidayToday = false;

              let specialDayInfo = null;
              for (let j = 4; j < data[headerRowIndex].length; j++) {
                const headerCell = data[headerRowIndex][j] || "";
                const match = headerCell.match(/(\d+)\s*[/.]\s*(\d+)/);
                if (match) {
                  const cellM = parseInt(match[1], 10);
                  const cellD = parseInt(match[2], 10);
                  if (cellM === targetM && cellD === targetD) {
                    const r3 = (data[headerRowIndex + 1] && data[headerRowIndex + 1][j]) ? data[headerRowIndex + 1][j].trim() : "";
                    const r4 = (data[headerRowIndex + 2] && data[headerRowIndex + 2][j]) ? data[headerRowIndex + 2][j].trim() : "";
                    const r5 = (data[headerRowIndex + 3] && data[headerRowIndex + 3][j]) ? data[headerRowIndex + 3][j].trim() : "";
                    if (r3.includes("간담회") || r4.includes("공휴일")) {
                      specialDayInfo = { student: r3, location: r4, memo: r5 };
                    }

                    const holidayRow = data[headerRowIndex + 2];
                    const is0512 = cellM === 5 && cellD === 12;
                    if (holidayRow && holidayRow[j] && holidayRow[j].includes("공휴일") && !is0512) {
                      isHolidayToday = true;
                    } else {
                      dateColumnIndex = j;
                      targetSearchDateStr = headerCell.trim();
                    }
                    break;
                  }
                }
              }

              if (isHolidayToday) {
                const targetTime = currentDisplayDate.getTime();
                const futureDates = parsedAvailableDates.filter(d => d.getTime() > targetTime);
                if (futureDates.length > 0) {
                  setCurrentDisplayDate(new Date(futureDates[0]));
                  setNotice("⚠️ 선택하신 날짜는 공휴일이므로 다음 유효한 날짜로 이동했습니다.");
                  return;
                } else {
                  const pastDates = parsedAvailableDates.filter(d => d.getTime() < targetTime);
                  if (pastDates.length > 0) {
                    setCurrentDisplayDate(new Date(pastDates[pastDates.length - 1]));
                    setNotice("⚠️ 선택하신 날짜는 공휴일이므로 이전 유효한 날짜로 이동했습니다.");
                    return;
                  }
                }
              }

              if (dateColumnIndex === -1) {
                const targetTime = currentDisplayDate.getTime();
                const futureDates = parsedAvailableDates.filter(d => d.getTime() > targetTime);
                if (futureDates.length > 0) {
                  setCurrentDisplayDate(new Date(futureDates[0]));
                  setNotice("⚠️ 해당 날짜의 데이터가 없어 다음 유효한 날짜로 이동했습니다.");
                  return;
                } else {
                  const pastDates = parsedAvailableDates.filter(d => d.getTime() < targetTime);
                  if (pastDates.length > 0) {
                    setCurrentDisplayDate(new Date(pastDates[pastDates.length - 1]));
                    setNotice("⚠️ 해당 날짜의 데이터가 없어 이전 유효한 날짜로 이동했습니다.");
                    return;
                  } else {
                    setScheduleData([]);
                    setNotice(`⚠️ 해당 날짜(${targetSearchDateStr})의 데이터가 없습니다.`);
                    setIsLoading(false);
                    setIsInitialLoad(false);
                    return;
                  }
                }
              }

              const realToday = new Date();
              realToday.setHours(0, 0, 0, 0);
              const currentYear = realToday.getFullYear();

              const getStudentCounts = (targetStudentName, maxColIndex, fullData, headerIdx) => {
                if (!targetStudentName) return null;

                const names = targetStudentName.split(/[/,]/).map(s => s.trim().split('(')[0].trim()).filter(s => s.length > 0);
                let results = [];

                names.forEach(searchName => {
                  if (searchName.includes("보조강사") || searchName.includes("자체학습") || searchName.includes("대상자발굴") || searchName.includes("도선복지관")) return;

                  let count = 0;
                  let attendedDatesForStudent = [];

                  for (let j = 4; j <= maxColIndex; j++) {
                    const headerStr = fullData[headerIdx][j] || "";
                    const match = headerStr.match(/(\d+)\s*[/.]\s*(\d+)/);
                    let colDate = new Date(0);
                    if (match) {
                      colDate = new Date(currentYear, parseInt(match[1]) - 1, parseInt(match[2]));
                      colDate.setHours(0, 0, 0, 0);
                    }

                    let foundStatuses = [];

                    for (let i = headerIdx + 1; i < fullData.length; i++) {
                      const row = fullData[i];
                      if (!row || row.length < 4) continue;
                      const category = row[3] ? row[3].replace(/\s+/g, '') : "";

                      if (category === "대상") {
                        const statusRow = (i + 2 < fullData.length) ? fullData[i + 2] : null;
                        const cellStudent = row[j] ? row[j].trim() : "";
                        const cellStatus = statusRow && statusRow[j] ? statusRow[j].trim() : "";

                        let finalStatus = cellStatus;
                        const cellNames = cellStudent.split(/[/,]/).map(s => s.trim().split('(')[0].trim()).filter(Boolean);
                        const nameIdx = cellNames.indexOf(searchName);

                        if (nameIdx !== -1 && cellStatus.includes('/')) {
                          const rawParts = cellStatus.split(',').map(s => s.trim()).filter(Boolean);
                          let tagParts = [];
                          let memoParts = [];
                          let isMemoStarted = false;

                          for (let i = 0; i < rawParts.length; i++) {
                            const part = rawParts[i];
                            if (!isMemoStarted) {
                              const subParts = part.split('/').map(p => p.trim());
                              const isAllTags = subParts.every(p => {
                                if (p === "") return true;
                                const cleanP = p.replace(/\s+/g, '');
                                if (ATTENDANCE_TAGS.includes(cleanP)) return true;
                                const spaceParts = p.split(/\s+/);
                                return spaceParts.every(sp => ATTENDANCE_TAGS.includes(sp));
                              });
                              if (isAllTags) {
                                tagParts.push(part);
                              } else {
                                isMemoStarted = true;
                                memoParts.push(part);
                              }
                            } else {
                              memoParts.push(part);
                            }
                          }

                          if (tagParts.length > 0) {
                            const combinedTagStr = tagParts.join(',');
                            const slashSegments = combinedTagStr.split('/');
                            if (slashSegments.length > nameIdx) {
                              finalStatus = slashSegments[nameIdx] + (memoParts.length > 0 ? ', ' + memoParts.join(', ') : '');
                            }
                          }
                        }

                        if (cellStudent.includes(searchName)) {
                          foundStatuses.push(finalStatus);
                        }
                      }
                    }

                    let hasSessionOnThisDay = false;

                    if (foundStatuses.length > 0) {
                      const nonEmpty = foundStatuses.filter(s => s !== "");
                      const statusesToEval = nonEmpty.length > 0 ? nonEmpty : foundStatuses;

                      const hasAbsence = statusesToEval.some(s => s.includes("결석"));

                      if (hasAbsence) {
                        hasSessionOnThisDay = false;
                      } else {
                        const hasNumber = statusesToEval.some(s => {
                          const parts = s.split(',').map(p => p.trim());
                          return parts.some(part => /^[1-9]\d*/.test(part));
                        });

                        if (hasNumber) {
                          hasSessionOnThisDay = true;
                        } else {
                          const isCanceled = statusesToEval.some(s => s.includes("취소") || s.includes("선생님휴가"));
                          if (isCanceled) {
                            hasSessionOnThisDay = false;
                          } else if (colDate < realToday) {
                            hasSessionOnThisDay = false;
                          } else {
                            hasSessionOnThisDay = true;
                          }
                        }
                      }
                    }

                    if (hasSessionOnThisDay) {
                      count++;
                      attendedDatesForStudent.push(colDate);
                    }
                  }
                  if (count > 0) {
                    results.push({ name: searchName, count: count, dates: attendedDatesForStudent });
                  }
                });
                return results.length > 0 ? results : null;
              };

              // 이미 fetchTeamData에서 수집된 allTeamSignData를 사용하여 파싱 진행
              let currentGroup = "", currentTeacher = "", currentTime = "", currentStudent = "", currentLocation = "", currentStatus = "", parsedData = [];
              for (let i = headerRowIndex + 1; i < data.length; i++) {
                const row = data[i];
                if (!row || row.length < 4) continue;

                if (row[0] && row[0].trim() !== "") currentGroup = row[0].trim();
                if (row[1] && row[1].trim() !== "") currentTeacher = row[1].trim();
                if (row[2] && row[2].trim() !== "") currentTime = row[2].trim();

                const category = row[3] ? row[3].replace(/\s+/g, '') : "";
                const targetCellData = row[dateColumnIndex] ? row[dateColumnIndex].trim() : "";

                if (category === "대상") {
                  currentStudent = targetCellData;
                } else if (category === "장소" || category === "싸인") {
                  // [수정] URL(싸인)은 일반 텍스트(장소)보다 우선순위를 가짐. 
                  // 이미 URL이 저장되어 있다면 일반 텍스트로 덮어쓰지 않음.
                  if (targetCellData) {
                    const isUrl = targetCellData.toLowerCase().startsWith('http') || targetCellData.toLowerCase().startsWith('data:') || targetCellData.toLowerCase().includes('drive.google.com') || targetCellData.toLowerCase().startsWith('=image');
                    const currentIsUrl = currentLocation.toLowerCase().startsWith('http') || currentLocation.toLowerCase().startsWith('data:') || currentLocation.toLowerCase().includes('drive.google.com') || currentLocation.toLowerCase().startsWith('=image');
                    if (isUrl || !currentIsUrl) {
                      currentLocation = targetCellData;
                    }
                  }
                } else if (category.includes("진행")) {
                  currentStatus = targetCellData;

                  let finalLoc = currentLocation;
                  // 취업팀의 경우 시트에서 읽어온 currentLocation(싸인 URL)을 그대로 사용함

                  const sessionCounts = getStudentCounts(currentStudent, dateColumnIndex, data, headerRowIndex);

                  let finalStu = currentStudent;
                  let finalStatus = currentStatus;
                  let isSpecialSlot = false;

                  if (specialDayInfo && (!finalStu && !finalLoc || ["김종철", "표영", "강계환"].includes(currentTeacher.trim()))) {
                    const teacherShifts = shifts;
                    if (currentTime === teacherShifts[0]) {
                      finalStu = specialDayInfo.student;
                      if (!finalLoc || !finalLoc.startsWith('http')) finalLoc = specialDayInfo.location;
                      if (specialDayInfo.memo && !finalStatus.includes(specialDayInfo.memo)) {
                        finalStatus = (finalStatus ? finalStatus + ", " : "") + specialDayInfo.memo;
                      }
                      isSpecialSlot = true;
                    }
                  }

                  parsedData.push({
                    group: currentGroup,
                    teacher: currentTeacher,
                    time: currentTime,
                    student: finalStu,
                    status: finalStatus,
                    location: finalLoc,
                    sessionCounts: sessionCounts,
                    isSpecial: isSpecialSlot
                  });

                  currentStudent = "";
                  currentLocation = "";
                  currentStatus = "";
                }
              }

              for (let i = 0; i < parsedData.length; i++) {
                parsedData[i].rowspan = { group: 1, teacher: 1, time: 1 };
                parsedData[i].render = { group: true, teacher: true, time: true };
              }

              const colsToMerge = ['group', 'teacher', 'time'];
              for (let c = 0; c < colsToMerge.length; c++) {
                const col = colsToMerge[c];
                let startRow = 0;
                while (startRow < parsedData.length) {
                  let count = 1;
                  for (let nextRow = startRow + 1; nextRow < parsedData.length; nextRow++) {
                    let sameAsParent = true;
                    for (let p = 0; p < c; p++) {
                      if (parsedData[startRow][colsToMerge[p]] !== parsedData[nextRow][colsToMerge[p]]) {
                        sameAsParent = false;
                        break;
                      }
                    }
                    if (sameAsParent && parsedData[startRow][col] === parsedData[nextRow][col]) {
                      count++;
                      parsedData[nextRow].render[col] = false;
                    } else {
                      break;
                    }
                  }
                  parsedData[startRow].rowspan[col] = count;
                  startRow += count;
                }
              }

              setScheduleData(parsedData);
            } catch (e) {
              console.error("데이터 파싱 중 에러 발생:", e);
            } finally {
              setIsLoading(false);
              setIsInitialLoad(false);
            }
          }
        });
      }, [rawData, currentDisplayDate, selectedTeam]);

      const handleDateChange = (daysToAdd) => {
        if (availableDates.length > 0) {
          const currentT = currentDisplayDate.getTime();

          if (daysToAdd < 0) {
            const pastDates = availableDates.filter(d => d.getTime() < currentT);
            if (pastDates.length > 0) {
              setCurrentDisplayDate(pastDates[pastDates.length - 1]);
              setIsInitialLoad(false);
              setNotice("");
            } else {
              setNotice("⚠️ 데이터의 시작 날짜입니다. 이전 기록이 없습니다.");
              setTimeout(() => setNotice(""), 3000);
            }
          } else {
            const futureDates = availableDates.filter(d => d.getTime() > currentT);
            if (futureDates.length > 0) {
              setCurrentDisplayDate(futureDates[0]);
              setIsInitialLoad(false);
              setNotice("");
            } else {
              setNotice("⚠️ 데이터의 마지막 날짜입니다. 이후 기록이 없습니다.");
              setTimeout(() => setNotice(""), 3000);
            }
          }
          return;
        }

        let tempDate = new Date(currentDisplayDate);
        do {
          tempDate.setDate(tempDate.getDate() + daysToAdd);
        } while (tempDate.getDay() === 0 || tempDate.getDay() === 6);
        tempDate.setHours(0, 0, 0, 0);

        if (daysToAdd < 0 && minDate && tempDate < minDate) {
          setNotice("⚠️ 시트의 첫 번째 일정입니다. 이전 날짜가 없습니다.");
          setTimeout(() => setNotice(""), 3000);
          return;
        }
        if (daysToAdd > 0 && maxDate && tempDate > maxDate) {
          setNotice("※ 시트의 마지막 일정입니다. 다음 날짜가 없습니다.");
          setTimeout(() => setNotice(""), 3000);
          return;
        }
        setCurrentDisplayDate(tempDate);
        setIsInitialLoad(false);
        setNotice("");
      };

      const handleToday = () => {
        let d = new Date();
        d.setHours(0, 0, 0, 0);
        if (d.getDay() === 6) d.setDate(d.getDate() + 2);
        else if (d.getDay() === 0) d.setDate(d.getDate() + 1);
        setCurrentDisplayDate(d);
        setIsInitialLoad(false);
        setNotice("");
      };

      const handleDatePick = (e) => {
        if (!e.target.value) return;
        const parts = e.target.value.split('-');
        const selectedDate = new Date(parts[0], parseInt(parts[1]) - 1, parts[2]);
        selectedDate.setHours(0, 0, 0, 0);

        if (minDate && selectedDate < minDate) {
          setNotice("⚠️ 시트의 첫 번째 일정보다 이전 날짜입니다.");
          setTimeout(() => setNotice(""), 3000);
          return;
        }
        if (maxDate && selectedDate > maxDate) {
          setNotice("※ 시트의 마지막 일정보다 이후 날짜입니다.");
          setTimeout(() => setNotice(""), 3000);
          return;
        }
        setCurrentDisplayDate(selectedDate);
        setIsInitialLoad(false);
        setNotice("");
      };

      const y = currentDisplayDate.getFullYear();
      const m = String(currentDisplayDate.getMonth() + 1).padStart(2, '0');
      const d = String(currentDisplayDate.getDate()).padStart(2, '0');
      const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
      const day = dayNames[currentDisplayDate.getDay()];
      const datePickerValue = `${y}-${m}-${d}`;

      return (
        <div className="min-h-[100dvh] flex flex-col bg-transparent font-sans text-gray-800 overflow-y-auto">
          <div className="shrink-0 bg-[#2b5ce6] text-white shadow-md z-40 relative">
            <div className="max-w-5xl mx-auto px-4 pb-4 pt-safe-4 flex justify-between items-start">
              <div>
                <div className="flex items-center mb-1">
                  <img src="Logo_of_Seoul.jpg" alt="서울시 로고" className="h-7 bg-white px-2 py-1 rounded-md object-contain mr-2" onError={(e) => e.target.style.display = 'none'} />
                  <h1 className="font-black text-xl leading-tight">성동노인종합복지관</h1>
                </div>
                <p className="text-base font-bold text-yellow-300 mb-1">디지털교육 서포터즈</p>
              </div>
              <button onClick={onNavigateBack} className="text-xs flex flex-col items-center font-bold p-2 rounded-lg shadow-md transition-all touch-manipulation bg-blue-800 text-white opacity-90 active:scale-95">
                <Home className="w-5 h-5 mb-1" /> 처음으로
              </button>
            </div>
          </div>

          <div className="flex-1 flex flex-col pb-0">
            <div className="max-w-5xl w-full mx-auto flex-1 flex flex-col p-3 md:p-6 pb-0 mt-2">
              <div className="bg-white rounded-xl shadow-lg border border-gray-200 flex flex-col overflow-hidden">

                <div className="shrink-0 z-30 bg-white px-4 md:px-6 pt-4 md:pt-6 pb-4 shadow-[0_4px_10px_-2px_rgba(0,0,0,0.1)] relative">

                  <div className="flex flex-row flex-wrap items-center justify-between gap-2 mb-0 border-b border-gray-100 pb-0.5 w-full">
                    <h2 className="text-[16px] min-[360px]:text-[18px] landscape:text-[22px] md:text-xl font-bold flex items-center gap-1 md:gap-2 text-gray-800 whitespace-nowrap min-w-0 tracking-tighter sm:tracking-normal">
                      <LucideCalendar className="w-4 h-4 md:w-5 md:h-5 text-blue-500" />
                      오늘의 수업 일정
                    </h2>

                    <div className="flex border border-gray-300 rounded-lg overflow-hidden shadow-sm shrink-0 ml-auto">
                      {["1팀", "2팀", "3팀", "취업팀"].map(team => (
                        <button key={team} onClick={() => {
                          setSelectedTeam(team);
                          setIsInitialLoad(true);
                          if (onTeamChange) onTeamChange(team);
                        }} className={`px-1 min-[360px]:px-2 md:px-4 py-1 md:py-1.5 border-r border-gray-300 text-[11px] min-[360px]:text-[13px] landscape:text-[18px] md:text-lg font-semibold tracking-tighter transition last:border-r-0 ${selectedTeam === team ? 'bg-[#2b5ce6] text-white' : 'bg-white text-gray-600 hover:bg-gray-50'}`}>
                          {team}
                        </button>
                      ))}
                    </div>
                  </div>

                  <div className="text-center min-h-[18px] mt-0 mb-0.5 flex items-center justify-center">
                    {isLoading ? (
                      <div className="flex items-center justify-center text-[#DC2626] font-bold text-sm md:text-base animate-pulse tracking-tight">
                        <Clock className="w-5 h-5 md:w-6 md:h-6 mr-1.5 animate-spin" />
                        최신 데이터 확인 중...
                      </div>
                    ) : notice ? (
                      <span className="text-red-500 text-sm md:text-base font-bold">{notice}</span>
                    ) : null}
                  </div>

                  <div className="flex items-center gap-1.5 sm:gap-2 w-full max-w-md mx-auto">
                    <button onClick={() => handleDateChange(-1)} className="w-10 sm:w-12 h-10 sm:h-12 flex items-center justify-center border-[1.5px] border-gray-300 rounded-xl bg-white shadow-sm hover:bg-gray-50 active:bg-gray-100 active:scale-95 touch-manipulation text-gray-700 shrink-0 transition-all">
                      <svg className="w-6 h-6 sm:w-7 sm:h-7" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z" /></svg>
                    </button>

                    <div className="flex-1 h-10 sm:h-12 relative flex items-center justify-center border-[1.5px] border-blue-400 rounded-xl bg-[#f0f7ff] text-center shadow-sm overflow-hidden transition-all">
                      <input
                        type="date"
                        value={datePickerValue}
                        onChange={handleDatePick}
                        onClick={(e) => {
                          try {
                            if (e.target.showPicker) e.target.showPicker();
                          } catch (err) { }
                        }}
                        min={minDate ? `${minDate.getFullYear()}-${String(minDate.getMonth() + 1).padStart(2, '0')}-${String(minDate.getDate()).padStart(2, '0')}` : undefined}
                        max={maxDate ? `${maxDate.getFullYear()}-${String(maxDate.getMonth() + 1).padStart(2, '0')}-${String(maxDate.getDate()).padStart(2, '0')}` : undefined}
                        className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10"
                        title="달력 열기"
                      />
                      <div className={`flex items-center justify-center pointer-events-none relative z-0 -translate-y-[1px] whitespace-nowrap px-1`}>
                        <span className="font-extrabold text-[#1e3a8a] text-[15px] min-[360px]:text-[17px] landscape:text-[22px] sm:text-[20px] tracking-tighter whitespace-nowrap">{currentDisplayDate.getMonth() + 1}/{currentDisplayDate.getDate()}</span>
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#1e3a8a" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="mx-1 sm:mx-1.5 w-4 h-4 sm:w-5 sm:h-5 shrink-0">
                          <rect width="18" height="18" x="3" y="4" rx="2" ry="2" />
                          <line x1="16" x2="16" y1="2" y2="6" />
                          <line x1="8" x2="8" y1="2" y2="6" />
                          <line x1="3" x2="21" y1="10" y2="10" />
                        </svg>
                        <span className="font-extrabold text-[#1e3a8a] text-[15px] min-[360px]:text-[17px] landscape:text-[22px] sm:text-[20px] tracking-tighter whitespace-nowrap shrink-0">({day})</span>
                      </div>
                    </div>

                    <button onClick={handleToday} className="text-[13px] sm:text-[15px] px-3 sm:px-4 h-10 sm:h-12 border border-blue-600 rounded-xl font-bold bg-blue-600 text-white shadow-sm flex items-center justify-center hover:bg-blue-700 active:bg-blue-800 active:scale-95 touch-manipulation whitespace-nowrap shrink-0 transition-all">오늘</button>
                    <button onClick={() => handleDateChange(1)} className="w-10 sm:w-12 h-10 sm:h-12 flex items-center justify-center border-[1.5px] border-gray-300 rounded-xl bg-white shadow-sm hover:bg-gray-50 active:bg-gray-100 active:scale-95 touch-manipulation text-gray-700 shrink-0 transition-all">
                      <svg className="w-6 h-6 sm:w-7 sm:h-7" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z" /></svg>
                    </button>
                  </div>
                </div>

                <div
                  className="flex-1 flex flex-col overflow-hidden px-4 md:px-6 pb-4 md:pb-6 pt-3 bg-gray-50/30"
                  onTouchStart={handleTouchStart}
                  onTouchEnd={handleTouchEnd}
                >
                  <div className="bg-white rounded-xl shadow-sm border border-gray-400 w-full flex-1 flex flex-col overflow-hidden">
                    <div className="overflow-auto relative rounded-xl flex-1">
                      <table className="w-full table-fixed text-center border-collapse">
                        <thead className="sticky top-0 z-20 shadow-md outline outline-1 outline-blue-500">
                          <tr className="bg-blue-600 text-white text-sm landscape:text-[17px] md:text-base leading-normal">
                            <th className="border border-blue-500 py-1.5 px-1 md:py-2 md:px-4 font-semibold w-[10%] md:w-[10%] break-keep bg-blue-600">조</th>
                            <th className="border border-blue-500 py-1.5 px-1 md:py-2 md:px-4 font-semibold w-[20%] md:w-[18%] break-keep sticky left-0 z-30 bg-blue-600 shadow-[2px_0_4px_-2px_rgba(0,0,0,0.2)]">선생님</th>
                            <th className="border border-blue-500 py-1.5 px-1 md:py-2 md:px-4 font-semibold w-[17%] md:w-[18%] break-keep bg-blue-600">시간</th>
                            <th className="border border-blue-500 py-1.5 px-1 md:py-2 md:px-2 font-semibold w-[37%] md:w-[38%] break-keep bg-blue-600 text-white">학생(장소)</th>
                            <th className="border border-blue-500 py-1.5 px-1 md:py-2 md:px-2 font-semibold w-[16%] md:w-[16%] break-keep bg-blue-600 text-white">회차</th>
                          </tr>
                        </thead>
                        <tbody className="text-gray-700 text-xs md:text-sm">
                          {scheduleData.length === 0 ? (
                            <tr><td colSpan="5" className="border border-gray-300 py-6 text-center bg-white"></td></tr>
                          ) : (
                            scheduleData.map((row, index) => {
                              const isNewTeacher = index > 0 && row.render.teacher;
                              const topBorderStyle = isNewTeacher ? { borderTop: '2px solid #9ca3af' } : {};

                              const tdClass = "border border-gray-400 py-1 px-1 md:py-1.5 md:px-3 align-middle break-keep";

                              let statusColorClass = "text-black font-bold";
                              if (row.status) {
                                const hasAbsenceOrCancel = row.status.includes("결석") || row.status.includes("취소");
                                const hasVacation = row.status.includes("휴가");
                                if (hasAbsenceOrCancel) {
                                  statusColorClass = "text-red-600 font-bold";
                                } else if (hasVacation) {
                                  statusColorClass = "text-gray-800 font-bold";
                                }
                              }

                              let locationTextClass = "text-gray-700";
                              if (row.location && row.location.length >= 4) {
                                locationTextClass = "text-gray-700 text-[10px] md:text-xs tracking-tighter";
                              }

                              let studentCellBg = "";
                              const combinedText = (row.student || "") + " " + (row.location || "");
                              if (row.isSpecial || combinedText.includes("공휴일") || combinedText.includes("간담회")) {
                                studentCellBg = "bg-red-200";
                              } else if (combinedText.includes("보조강사")) {
                                studentCellBg = "bg-[#FFFF00]";
                              } else if (combinedText.includes("경로당") || combinedText.includes("도선복지관")) {
                                studentCellBg = "bg-orange-100";
                              } else {
                                const pinkLocs = ["방문", "사근복지관", "삼부", "성원"];
                                if (row.location && pinkLocs.some(loc => row.location.includes(loc))) {
                                  studentCellBg = "bg-pink-100";
                                }
                              }

                              const locTextForDisplay = row.location ? row.location.trim() : "";
                              const isLocationUrl = locTextForDisplay && (locTextForDisplay.startsWith('http') || locTextForDisplay.startsWith('//') || locTextForDisplay.startsWith('data:') || locTextForDisplay.includes('drive.google.com'));
                              const showLocationText = locTextForDisplay && locTextForDisplay !== "복지관" && !(row.student || "").includes("보조강사") && selectedTeam !== '취업팀' && !isLocationUrl;

                              const hasKiosk = ((row.student || "") + (locTextForDisplay)).includes("키오스크");
                              const stuLen = (row.student || "").length;

                              let dynamicStuSizeClass = hasKiosk ? "text-[14px] md:text-[15px] landscape:text-[18px]" : "text-[15px] md:text-[17px] landscape:text-[19px]";
                              if (stuLen >= 9) {
                                dynamicStuSizeClass = "text-[11px] min-[360px]:text-[12px] md:text-[14px] landscape:text-[16px] tracking-tighter";
                              } else if (stuLen >= 6) {
                                dynamicStuSizeClass = "text-[13px] min-[360px]:text-[14px] md:text-[15px] landscape:text-[17px] tracking-tight";
                              }

                              return (
                                <tr key={index} className="border-b border-gray-400 hover:bg-blue-50 transition bg-white">
                                  {row.render.group && <td className={`${tdClass} font-medium text-gray-800 text-[1.2em] landscape:text-[1.5em]`} rowSpan={row.rowspan.group} style={topBorderStyle}>{typeof row.group === 'string' ? row.group.replace('조', '').trim() : row.group}</td>}

                                  {row.render.teacher && (
                                    <td className={`${tdClass} bg-blue-100 font-bold text-gray-900 text-[16px] landscape:text-[20px] md:text-[18px] sticky left-0 z-10 shadow-[2px_0_4px_-2px_rgba(0,0,0,0.1)]`} rowSpan={row.rowspan.teacher} style={topBorderStyle}>
                                      {typeof row.teacher === 'string' ? (
                                        row.teacher.trim().split(/\s+/).map((namePart, idx) => (
                                          <div key={idx} className="leading-tight whitespace-nowrap">{namePart}</div>
                                        ))
                                      ) : (
                                        <div className="leading-tight whitespace-nowrap">{row.teacher}</div>
                                      )}
                                    </td>
                                  )}

                                  {row.render.time && (
                                    <td className={`${tdClass} text-gray-700 text-[14px] landscape:text-[18px] md:text-[17px] tracking-tighter`} rowSpan={row.rowspan.time} style={topBorderStyle}>
                                      {typeof row.time === 'string' && row.time.includes('~') ? (
                                        <>
                                          <div className="flex md:hidden landscape:hidden w-full justify-center items-center leading-tight whitespace-nowrap">
                                            {row.time.split('~')[0].trim()}~
                                          </div>
                                          <div className="hidden md:flex landscape:flex w-full justify-center items-center leading-tight whitespace-nowrap text-center">
                                            {row.time.replace(/\s+/g, '')}
                                          </div>
                                        </>
                                      ) : (
                                        <div className="flex w-full justify-center items-center whitespace-nowrap text-center">{row.time}</div>
                                      )}
                                    </td>
                                  )}

                                  <td className={`${tdClass} ${studentCellBg}`} style={topBorderStyle}>
                                    <div className={`font-bold text-blue-600 ${dynamicStuSizeClass} leading-[1.1] w-full flex flex-col items-center justify-center`}>
                                      <span className="whitespace-nowrap text-center">{(row.student || "").replace(/\n/g, ' ')}</span>
                                      {showLocationText && !locTextForDisplay?.startsWith('http') && !locTextForDisplay?.startsWith('data:') && (
                                        <span className="whitespace-nowrap text-center mt-0.5 font-medium text-gray-500 text-[0.8em]">({locTextForDisplay})</span>
                                      )}
                                    </div>
                                    <div className={`text-[14px] landscape:text-[18px] md:text-[16px] ${statusColorClass} mt-1 whitespace-normal break-words break-keep leading-tight text-center`}>
                                      {row.status}
                                      {/* [수정] 취업팀인 경우 이미지가 있다면 표시 (URL 텍스트는 제거) */}
                                    </div>

                                    {/* 싸인 표시 (취업팀 전용) */}
                                    {(selectedTeam?.trim() === '취업팀' || selectedTeam?.toLowerCase().includes('취업')) && row.location && (row.location.toLowerCase().startsWith('http') || row.location.toLowerCase().startsWith('data:') || row.location.toLowerCase().includes('drive.google.com') || row.location.toLowerCase().startsWith('=image')) && (
                                      <div className="mt-2 w-full flex flex-col items-center">
                                        <div
                                          onClick={(e) => {
                                            e.stopPropagation();
                                            const key = `${row.teacher}_${row.time}_${row.student}`;
                                            setExpandedSigns(prev => ({ ...prev, [key]: !prev[key] }));
                                          }}
                                          className={`relative group cursor-pointer transition-all duration-300 ${expandedSigns[`${row.teacher}_${row.time}_${row.student}`]
                                              ? 'ring-2 ring-blue-500 ring-offset-2 rounded-lg'
                                              : 'hover:scale-105'
                                            }`}
                                        >
                                          <div className={`overflow-hidden rounded-lg border border-blue-300 shadow-sm bg-white/50 backdrop-blur-sm ${expandedSigns[`${row.teacher}_${row.time}_${row.student}`] ? 'p-1' : 'p-0.5'
                                            }`}>
                                            <img
                                              src={getDirectImageUrl(row.location)}
                                              alt="Sign"
                                              className={`object-contain mix-blend-multiply transition-all duration-500 ${expandedSigns[`${row.teacher}_${row.time}_${row.student}`]
                                                  ? 'h-24 sm:h-32 w-auto'
                                                  : 'h-10 sm:h-12 w-auto opacity-80 group-hover:opacity-100'
                                                }`}
                                              onError={(e) => { e.target.closest('div').style.display = 'none'; }}
                                            />
                                          </div>

                                          {!expandedSigns[`${row.teacher}_${row.time}_${row.student}`] && (
                                            <div className="absolute -top-1 -right-1 bg-blue-600 text-white p-0.5 rounded-full shadow-md animate-pulse">
                                              <EditIcon className="w-2.5 h-2.5" />
                                            </div>
                                          )}
                                        </div>

                                        <button
                                          onClick={(e) => {
                                            e.stopPropagation();
                                            const key = `${row.teacher}_${row.time}_${row.student}`;
                                            setExpandedSigns(prev => ({ ...prev, [key]: !prev[key] }));
                                          }}
                                          className="mt-1 text-[10px] font-black text-blue-500 hover:text-blue-700 transition-colors uppercase tracking-tighter"
                                        >
                                          {expandedSigns[`${row.teacher}_${row.time}_${row.student}`] ? "닫기" : "확대보기"}
                                        </button>
                                      </div>
                                    )}
                                  </td>

                                  <td className={`${tdClass} font-bold text-center text-[13px] landscape:text-[16px] md:text-[15px] transition-colors`} style={topBorderStyle}>
                                    {row.sessionCounts && !row.student?.includes("간담회") ? (
                                      <div className="flex flex-col w-full justify-center items-center gap-1">
                                        {row.sessionCounts.map((sc, scIdx) => {
                                          let sessionCellBg = "bg-gray-300";
                                          let sessionTextCol = "text-black";

                                          if (sc.count >= 10) {
                                            sessionCellBg = "bg-purple-900";
                                            sessionTextCol = "text-white";
                                          } else if (sc.count >= 7) {
                                            sessionCellBg = "bg-purple-400";
                                            sessionTextCol = "text-white";
                                          }

                                          return (
                                            <div key={scIdx} onClick={() => setSelectedStudentDates(sc)} className={`px-1.5 py-0.5 rounded w-full whitespace-nowrap ${sessionCellBg} ${sessionTextCol} shadow-sm cursor-pointer hover:brightness-95 active:scale-95 transition-all`}>
                                              {sc.count}회차
                                            </div>
                                          );
                                        })}
                                      </div>
                                    ) : (
                                      <span className="text-purple-700">-</span>
                                    )}
                                  </td>
                                </tr>
                              );
                            })
                          )}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>

                <SummarySection
                  data={scheduleData}
                  date={currentDisplayDate}
                  team={selectedTeam}
                  onTouchStart={handleTouchStart}
                  onTouchEnd={handleTouchEnd}
                />

              </div>
            </div>
          </div>

          {selectedStudentDates && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[60] px-2 sm:px-4" onClick={() => setSelectedStudentDates(null)}>
              <div className="bg-white rounded-2xl shadow-xl w-full max-w-xl overflow-hidden flex flex-col max-h-[80vh] animate-fadeIn" onClick={e => e.stopPropagation()}>
                <div className="bg-purple-600 text-white py-3 px-4 flex justify-between items-center shrink-0">
                  <h3 className="font-bold text-[18px] sm:text-[20px]">{selectedStudentDates.name}님의 출석 일자 <span className="text-purple-200 text-[15px] sm:text-[16px]">({selectedStudentDates.count}회)</span></h3>
                  <button onClick={() => setSelectedStudentDates(null)} className="text-white hover:text-gray-200 active:scale-90 transition-transform">
                    <svg className="w-6 h-6 sm:w-7 sm:h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                  </button>
                </div>
                <div className="p-3 sm:p-4 overflow-y-auto">
                  <div className="grid grid-cols-4 gap-2 sm:gap-3">
                    {selectedStudentDates.dates.map((d, idx) => {
                      const today = new Date();
                      const isToday = d.getFullYear() === today.getFullYear() && d.getMonth() === today.getMonth() && d.getDate() === today.getDate();
                      return (
                        <div key={idx} className={`${isToday ? 'bg-purple-300 border-purple-500 shadow-md text-purple-950' : 'bg-purple-50 border-purple-200 shadow-sm text-purple-900'} rounded-lg py-2.5 sm:py-3 px-0.5 sm:px-1 text-center text-[13.5px] min-[360px]:text-[15.5px] sm:text-[18px] font-bold flex justify-center items-center whitespace-nowrap tracking-tighter sm:tracking-normal`}>
                          {d.getMonth() + 1}/{d.getDate()} ({['일', '월', '화', '수', '목', '금', '토'][d.getDay()]})
                        </div>
                      );
                    })}
                  </div>
                  {selectedStudentDates.dates.length === 0 && (
                    <div className="text-center text-gray-500 py-4 font-bold text-[16px] sm:text-[18px]">출석 기록이 없습니다.</div>
                  )}
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    // =====================================================================
    // 🔍 대상자 검색 컴포넌트
    // =====================================================================
    function StudentSearchApp({ onNavigateBack }) {
      const [allRecords, setAllRecords] = useState([]);
      const [teamFilter, setTeamFilter] = useState("전체");
      const [selectedName, setSelectedName] = useState("");
      const [isLoading, setIsLoading] = useState(true);
      const [loadProgress, setLoadProgress] = useState("");
      const [searchTerm, setSearchTerm] = useState("");
      const [recentSearches, setRecentSearches] = useState(() => {
        try {
          const saved = localStorage.getItem('sungdong_recent_searches');
          return saved ? JSON.parse(saved) : [];
        } catch (e) { return []; }
      });

      const getSearchChoSung = (name) => {
        if (!name) return "";
        return name.split('').map(char => {
          const charCode = char.charCodeAt(0);
          if (charCode < 0xAC00 || charCode > 0xD7A3) return char;
          const choIndex = Math.floor(((charCode - 0xAC00) / 28) / 21);
          const choList = ["ㄱ", "ㄱ", "ㄴ", "ㄷ", "ㄷ", "ㄹ", "ㅁ", "ㅂ", "ㅂ", "ㅅ", "ㅅ", "ㅇ", "ㅈ", "ㅈ", "ㅊ", "ㅋ", "ㅌ", "ㅍ", "ㅎ"];
          return choList[choIndex];
        }).join('');
      };

      const currentTeamNames = useMemo(() => {
        let records = allRecords;
        if (teamFilter !== "전체") {
          records = allRecords.filter(r => r.team === teamFilter);
        }
        const nameSet = new Set();
        records.forEach(r => nameSet.add(r.name));
        return Array.from(nameSet).sort((a, b) => a.localeCompare(b, 'ko'));
      }, [allRecords, teamFilter]);

      const filteredNames = useMemo(() => {
        if (searchTerm.trim() === "") return currentTeamNames;

        const lowerSearch = searchTerm.toLowerCase().replace(/\s+/g, '');
        return currentTeamNames.filter(name => {
          const normalizedName = name.toLowerCase().replace(/\s+/g, '');
          const choName = getSearchChoSung(name);
          return normalizedName.includes(lowerSearch) || choName.includes(lowerSearch);
        });
      }, [currentTeamNames, searchTerm]);

      const ATTENDANCE_TAGS = ['1', '결석', '취소', '선생님휴가'];

      useEffect(() => {
        document.documentElement.style.overscrollBehaviorY = 'auto';
        document.body.style.overscrollBehaviorY = 'auto';
      }, []);

      useEffect(() => {
        const teams = ["1팀", "2팀", "3팀", "취업팀"];
        let allParsed = [];
        let loaded = 0;

        const parseTeamCsv = (csvText, teamName) => {
          return new Promise((resolve) => {
            window.Papa.parse(csvText, {
              header: false,
              skipEmptyLines: true,
              complete: (results) => {
                const data = results.data;
                let headerRowIdx = -1;
                for (let i = 0; i < Math.min(10, data.length); i++) {
                  if (data[i] && data[i].length > 3 && data[i][3].replace(/\s+/g, '') === "구분") {
                    headerRowIdx = i; break;
                  }
                }
                if (headerRowIdx === -1) { resolve([]); return; }

                const headerRow = data[headerRowIdx];
                const currentYear = new Date().getFullYear();
                const today = new Date();
                today.setHours(23, 59, 59, 999);
                let records = [];

                for (let j = 4; j < headerRow.length; j++) {
                  const cellStr = headerRow[j] || "";
                  const match = cellStr.match(/(\d+)\s*[/.]\s*(\d+)/);
                  if (!match) continue;
                  const colMonth = parseInt(match[1]);
                  const colDay = parseInt(match[2]);
                  const colDate = new Date(currentYear, colMonth - 1, colDay);
                  colDate.setHours(0, 0, 0, 0);
                  if (colDate > today) continue;
                  const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
                  const dateStr = `${colMonth}/${colDay}(${dayNames[colDate.getDay()]})`;

                  let currentGroup = "";
                  let currentTeacher = "";
                  let currentTime = "";

                  for (let i = headerRowIdx + 1; i < data.length; i++) {
                    const row = data[i];
                    if (!row || row.length < 4) continue;
                    if (row[0] && row[0].trim()) currentGroup = row[0].trim();
                    if (row[1] && row[1].trim()) currentTeacher = row[1].trim();
                    if (row[2] && row[2].trim()) currentTime = row[2].trim();

                    const category = row[3] ? row[3].replace(/\s+/g, '') : "";

                    if (category === "대상") {
                      const cellStudent = row[j] ? row[j].trim() : "";
                      if (!cellStudent) continue;

                      const statusRow = (i + 2 < data.length) ? data[i + 2] : null;
                      const locationRow = (i + 1 < data.length) ? data[i + 1] : null;
                      const cellStatus = statusRow && statusRow[j] ? statusRow[j].trim() : "";
                      const cellLocation = locationRow && locationRow[j] ? locationRow[j].trim() : "";
                      const locCategory = locationRow && locationRow[3] ? locationRow[3].replace(/\s+/g, '') : "";
                      const finalLocation = locCategory === "장소" ? cellLocation : "";

                      const names = cellStudent.split(/[/,]/).map(s => s.trim().split('(')[0].trim()).filter(Boolean);

                      names.forEach((name, nameIdx) => {
                        const excludeKeywords = ["보조강사", "자체학습", "대상자발굴", "도선복지관", "소양교육", "간담회", "수업", "준비", "컴기초", "공휴일", "근로자의날", "근로자의 날", "삼일절", "3.1절", "어린이날", "현충일", "광복절", "개천절", "한글날", "석가탄신일", "부처님오신날", "성탄절", "제헌절", "추석", "설날", "신정", "대체공휴일"];
                        if (excludeKeywords.some(keyword => name.includes(keyword))) return;

                        const locForFilter = finalLocation || "";
                        if (locForFilter.includes("공휴일") || locForFilter.includes("대체공휴일")) return;

                        let personalStatus = cellStatus;
                        if (cellStatus.includes('/')) {
                          const rawParts = cellStatus.split(',').map(s => s.trim()).filter(Boolean);
                          let tagParts = [];
                          let memoParts = [];
                          let isMemoStarted = false;
                          for (let k = 0; k < rawParts.length; k++) {
                            const part = rawParts[k];
                            if (!isMemoStarted) {
                              const subParts = part.split('/').map(p => p.trim());
                              const isAllTags = subParts.every(p => {
                                if (p === "") return true;
                                const cleanP = p.replace(/\s+/g, '');
                                if (ATTENDANCE_TAGS.includes(cleanP)) return true;
                                return p.split(/\s+/).every(sp => ATTENDANCE_TAGS.includes(sp));
                              });
                              if (isAllTags) tagParts.push(part);
                              else { isMemoStarted = true; memoParts.push(part); }
                            } else { memoParts.push(part); }
                          }
                          if (tagParts.length > 0) {
                            const combined = tagParts.join(',');
                            const segments = combined.split('/');
                            if (segments.length > nameIdx) {
                              personalStatus = segments[nameIdx].trim() + (memoParts.length > 0 ? ', ' + memoParts.join(', ') : '');
                            }
                          }
                        }

                        let attendanceTag = "";
                        let memo = "";
                        if (personalStatus) {
                          const parts = personalStatus.split(',').map(s => s.trim());
                          let tagFound = [];
                          let memoFound = [];
                          parts.forEach(p => {
                            const clean = p.replace(/\s+/g, '');
                            if (ATTENDANCE_TAGS.includes(clean) || clean === "출석") {
                              tagFound.push(clean === "1" ? "출석" : clean);
                            } else if (/^\d+$/.test(clean)) {
                              tagFound.push("출석(" + clean + "명)");
                            } else if (p) {
                              memoFound.push(p);
                            }
                          });
                          attendanceTag = tagFound.join(', ') || (personalStatus ? "기록있음" : "");
                          memo = memoFound.join(', ');
                        }

                        records.push({
                          name, dateStr, colDate, team: teamName,
                          teacher: currentTeacher, time: currentTime,
                          location: finalLocation || "복지관",
                          attendanceTag, memo, group: currentGroup
                        });
                      });
                    }
                  }
                }
                resolve(records);
              }
            });
          });
        };

        const loadAll = async () => {
          setIsLoading(true);
          for (const team of teams) {
            setLoadProgress(`${team} 데이터 로딩 중...`);
            const exportUrl = SHEET_URLS[team] ? SHEET_URLS[team].replace(/\/edit.*gid=(\d+).*/, '/export?format=csv&gid=$1') : "";
            if (!exportUrl) continue;
            try {
              const res = await fetch(`${exportUrl}&t=${Date.now()}`);
              const csv = await res.text();
              const records = await parseTeamCsv(csv, team);
              allParsed = allParsed.concat(records);
              loaded++;
            } catch (e) { console.error(`${team} 로드 실패:`, e); }
          }

          allParsed.sort((a, b) => b.colDate - a.colDate);

          const nameSet = new Set();
          allParsed.forEach(r => nameSet.add(r.name));
          const sorted = Array.from(nameSet).sort((a, b) => a.localeCompare(b, 'ko'));

          setAllRecords(allParsed);
          setIsLoading(false);
          setLoadProgress("");
        };

        loadAll();
      }, []);

      const filteredRecords = useMemo(() => {
        if (!selectedName || selectedName.trim() === "") return [];
        const raw = allRecords.filter(r => r.name === selectedName);
        if (raw.length === 0) return [];

        const dateMap = new Map();
        raw.forEach(r => {
          const key = r.colDate.getTime();
          if (dateMap.has(key)) {
            const existing = dateMap.get(key);
            const existingTeachers = existing.teacher.split(', ');
            if (!existingTeachers.includes(r.teacher)) {
              existing.teacher += ', ' + r.teacher;
            }
            if (r.location && r.location !== "복지관" && !existing.location.includes(r.location)) {
              existing.location += ', ' + r.location;
            }
            if (r.memo && !existing.memo.includes(r.memo)) {
              existing.memo = existing.memo ? existing.memo + ', ' + r.memo : r.memo;
            }
          } else {
            dateMap.set(key, { ...r });
          }
        });
        return Array.from(dateMap.values()).sort((a, b) => b.colDate - a.colDate);
      }, [selectedName, allRecords]);

      const stats = useMemo(() => {
        if (filteredRecords.length === 0) return null;
        const attended = filteredRecords.filter(r => r.attendanceTag.includes("출석")).length;
        const absent = filteredRecords.filter(r => r.attendanceTag.includes("결석")).length;
        const canceled = filteredRecords.filter(r => r.attendanceTag.includes("취소")).length;
        return { total: filteredRecords.length, attended, absent, canceled };
      }, [filteredRecords]);

      return (
        <div className="min-h-[100dvh] flex flex-col bg-transparent font-sans text-gray-800">
          <div className="shrink-0 bg-gradient-to-r from-teal-600 to-teal-500 text-white shadow-lg z-40 relative">
            <div className="max-w-5xl mx-auto px-4 pb-4 pt-safe-4 flex justify-between items-start">
              <div>
                <div className="flex items-center mb-1">
                  <img src="Logo_of_Seoul.jpg" alt="서울시 로고" className="h-7 bg-white px-2 py-1 rounded-md object-contain mr-2" onError={(e) => e.target.style.display = 'none'} />
                  <h1 className="font-black text-xl leading-tight">성동노인종합복지관</h1>
                </div>
                <p className="text-base font-bold text-yellow-300 mb-1">디지털교육 서포터즈</p>
              </div>
              <button onClick={onNavigateBack} className="text-xs flex flex-col items-center font-bold p-2 rounded-lg shadow-md transition-all touch-manipulation bg-teal-800 text-white opacity-90 active:scale-95">
                <Home className="w-5 h-5 mb-1" /> 처음으로
              </button>
            </div>
          </div>

          <div className="flex-1 flex flex-col pb-4">
            <div className="max-w-5xl w-full mx-auto flex-1 flex flex-col p-3 md:p-6 mt-2">
              <div className="bg-white rounded-2xl shadow-lg border border-gray-200 overflow-hidden">
                <div className="bg-gradient-to-r from-teal-500 to-emerald-500 px-4 md:px-6 py-2">
                  <div className="flex flex-col gap-1 pt-0.5">
                    <div className="flex items-center justify-between gap-2">
                      <h2 className="text-white font-extrabold text-lg md:text-xl flex items-center gap-2 whitespace-nowrap">
                        <svg className="w-5 h-5 md:w-6 md:h-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8" /><line x1="21" x2="16.65" y1="21" y2="16.65" /></svg>
                        대상자 검색
                      </h2>
                      <div className="flex border border-gray-300 rounded-lg overflow-hidden shadow-sm shrink-0 ml-auto">
                        {['전체', '1팀', '2팀', '3팀', '취업팀'].map(t => (
                          <button key={t} onClick={() => setTeamFilter(t)} className={`px-1 min-[360px]:px-2 md:px-4 py-1 md:py-1.5 border-r border-gray-300 text-[11px] min-[360px]:text-[13px] landscape:text-[18px] md:text-lg font-semibold tracking-tighter transition last:border-r-0 ${teamFilter === t ? 'bg-[#2b5ce6] text-white' : 'bg-white text-gray-600 hover:bg-gray-50'}`}>
                            {t}
                          </button>
                        ))}
                      </div>
                    </div>
                    <p className="text-teal-100 text-[13px] md:text-base whitespace-nowrap">대상자를 선택하세요 ({filteredNames.length}명)</p>
                  </div>
                </div>

                <div className="px-4 md:px-6 py-3">
                  {isLoading ? (
                    <div className="flex flex-col items-center justify-center py-12 gap-3">
                      <Clock className="w-8 h-8 text-teal-500 animate-spin" />
                      <p className="text-teal-700 font-bold text-base animate-pulse">{loadProgress}</p>
                    </div>
                  ) : (
                    <div>

                      {/* 🔍 실시간 검색창 추가 */}
                      <div className="relative mb-3">
                        <div className="absolute left-3 top-1/2 -translate-y-1/2 text-teal-500 pointer-events-none">
                          <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        </div>
                        <input
                          type="text"
                          placeholder="이름 또는 초성 검색 (예: ㄱㄷㅎ)"
                          value={searchTerm}
                          onChange={(e) => {
                            const val = e.target.value;
                            setSearchTerm(val);
                            if (val.trim() !== "") {
                              setSelectedName("");
                            }
                          }}
                          className="w-full pl-10 pr-10 py-2 rounded-xl border-2 border-teal-300 focus:border-teal-500 focus:ring-4 focus:ring-teal-50 outline-none transition-all text-[15px] font-bold shadow-sm placeholder:text-gray-400"
                        />
                        {searchTerm && (
                          <button
                            onClick={() => setSearchTerm("")}
                            className="absolute right-3 top-1/2 -translate-y-1/2 w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 text-gray-400 transition-colors"
                          >
                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                          </button>
                        )}
                      </div>

                      {/* 🔍 검색 결과 없음 메시지 */}
                      {searchTerm && filteredNames.length === 0 && (
                        <div className="flex flex-col items-center justify-center py-6 bg-red-50/50 rounded-xl border border-red-100 mb-3 animate-fadeIn">
                          <svg className="w-10 h-10 text-red-300 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9.172 9.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                          <p className="text-red-500 font-bold text-[15px]">해당 이름의 대상자가 없습니다.</p>
                        </div>
                      )}

                      {/* 🕒 최근 검색 대상자 */}
                      {recentSearches.length > 0 && !searchTerm && (
                        <div className="mb-3">
                          <div className="flex justify-between items-center mb-1 px-1">
                            <p className="text-[14px] md:text-[15] text-blue-700 font-extrabold">최근 찾은 대상자</p>
                            <button
                              onClick={() => {
                                setRecentSearches([]);
                                localStorage.removeItem('sungdong_recent_searches');
                              }}
                              className="text-[14px] md:text-[15px] text-blue-700 hover:text-blue-800 font-extrabold"
                            >
                              지우기
                            </button>
                          </div>
                          <div className="flex flex-wrap gap-1.5 items-center justify-center">
                            {recentSearches.map(name => (
                              <button
                                key={name}
                                onClick={() => {
                                  setSelectedName(name);
                                  setSearchTerm("");
                                }}
                                className={`px-3 py-1 rounded-full text-[13px] font-bold border transition-all active:scale-95 ${selectedName === name ? 'bg-teal-600 text-white border-teal-700 shadow-md' : 'bg-emerald-50 text-emerald-800 border-emerald-200 shadow-sm hover:bg-emerald-100 hover:border-emerald-300'}`}
                              >
                                {name}
                              </button>
                            ))}
                          </div>
                        </div>
                      )}

                      {/* 대상자 리스트 */}
                      <div className="max-h-[194px] md:max-h-[384px] overflow-y-auto border-2 border-teal-300 rounded-xl p-1 bg-gray-50/50">
                        <div className="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 lg:grid-cols-10 gap-1">
                          {filteredNames.map(name => {
                            const isSpecial = name === "금호벽산경로당" || name === "금호벽산제2경로당";
                            const nameLen = name.length;
